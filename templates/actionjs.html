function _fmtTs() {
    const d = new Date();
    const yy  = String(d.getFullYear()).slice(-2);
    const mo  = String(d.getMonth() + 1).padStart(2, '0');
    const dd  = String(d.getDate()).padStart(2, '0');
    const hh  = String(d.getHours()).padStart(2, '0');
    const mm  = String(d.getMinutes()).padStart(2, '0');
    const ss  = String(d.getSeconds()).padStart(2, '0');
    return `${yy}-${mo}-${dd} ${hh}.${mm}.${ss}`;
}


function downloadDetail(outputFormat = 'db') {
    if (!lastFetchedIds.length) { alert('Tampilkan ringkasan sampel dulu.'); return; }
    const btn      = document.getElementById('btnDownloadDetail');
    const progress = document.getElementById('downloadProgress');
    const total    = lastFetchedIds.length;
    
    if (btn) btn.disabled = true;
    if (progress) {
        progress.textContent = '0/' + total;
        progress.style.display = 'none';
    }
    showProgress(true, 'Menyiapkan unduhan...', 0);

    fetch('/fasihsm-fetcher/api/sampel-detail-json', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({sample_ids: lastFetchedIds, survey_name: surveyName, survey_id: currentSurveyId, output_format: outputFormat})
    })
    .then(res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        function read() {
            return reader.read().then(({done, value}) => {
                if (done) return;
                buffer += decoder.decode(value, {stream: true});
                const parts = buffer.split('\n\n');
                buffer = parts.pop();
                for (const part of parts) {
                    const line = part.replace(/^data: /, '').trim();
                    if (!line) continue;
                    try {
                        const msg = JSON.parse(line);
                        if (msg.progress !== undefined) {
                            progress.textContent = msg.progress + '/' + total;
                            const pct = total ? (Number(msg.progress) / total) * 100 : 0;
                            showProgress(true, `Mengunduh detail sampel: ${msg.progress}/${total}`, pct);
                        }
                        if (msg.done) {
                            if (msg.error) {
                                alert('Error: ' + msg.error);
                                btn.disabled = false;
                                showProgress(false);
                            } else {
                                progress.textContent = total + '/' + total + ' ✓';
                                showProgress(true, `Selesai: ${total}/${total} ✓`, 100);
                                setTimeout(() => { showProgress(false); }, 3000);
                                window.location.href = `/fasihsm-fetcher/api/sampel-detail-download/${msg.token}`;
                                setTimeout(() => { btn.disabled = false; }, 2000);
                            }
                        }
                    } catch(e) {}
                }
                return read();
            });
        }
        return read();
    })
    .catch(err => {
        alert('Gagal download: ' + err);
        btn.disabled = false;
        progress.style.display = 'none';
        showProgress(false);
    });
}

async function syncToIndexedDB() {
    if (!lastFetchedIds.length) { alert('Tampilkan ringkasan sampel dulu.'); return; }
    if (!window.localforage) { alert('LocalForage (IndexedDB) tidak dimuat.'); return; }

    const btn      = document.getElementById('btnSyncOffline');
    const progress = document.getElementById('downloadProgress');
    const total    = lastFetchedIds.length;
    
    if (btn) btn.disabled = true;
    if (progress) {
        progress.textContent = '0/' + total;
        progress.style.display = 'none';
    }
    showProgress(true, 'Menyiapkan sinkronisasi offline...', 0);

    try {
        const res = await fetch('/fasihsm-fetcher/api/sampel-detail-json', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({sample_ids: lastFetchedIds, survey_name: surveyName, survey_id: currentSurveyId, output_format: 'json'})
        });
        
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let downloadUrl = '';

        while (true) {
            const {done, value} = await reader.read();
            if (done) break;
            
            buffer += decoder.decode(value, {stream: true});
            const parts = buffer.split('\n\n');
            buffer = parts.pop();
            
            for (const part of parts) {
                const line = part.replace(/^data: /, '').trim();
                if (!line) continue;
                try {
                    const msg = JSON.parse(line);
                    if (msg.progress !== undefined) {
                        const pct = total ? (Number(msg.progress) / total) * 100 : 0;
                        showProgress(true, `Menarik data: ${msg.progress}/${total}`, pct);
                    }
                    if (msg.done) {
                        if (msg.error) throw new Error(msg.error);
                        downloadUrl = `/fasihsm-fetcher/api/sampel-detail-download/${msg.token}`;
                    }
                } catch(e) {}
            }
        }

        if (downloadUrl) {
            showProgress(true, 'Menyimpan data ke IndexedDB...', 100);
            const jsonRes = await fetch(downloadUrl);
            const rows = await jsonRes.json();
            
            // Simpan setiap assignment ke localforage: `assignment_${id}`
            const dbPromises = rows.map(row => localforage.setItem(`assignment_${row.id}`, row));
            await Promise.all(dbPromises);
            
            // Simpan daftar assignment_ids untuk survei ini
            await localforage.setItem(`offline_survey_${currentSurveyId}`, rows.map(r => r.id));
            
            showProgress(true, `Sinkronisasi Selesai ✓`, 100);
            Swal.fire('Berhasil', `${rows.length} data sampel tersimpan untuk akses offline!`, 'success');
            setTimeout(() => { showProgress(false); }, 3000);
        }

    } catch (err) {
        alert('Gagal sinkronisasi: ' + err);
        showProgress(false);
    } finally {
        if (btn) btn.disabled = false;
    }
}

function _triggerJsonDownload(jsonContent, filename) {
    const blob = new Blob([jsonContent], { type: 'application/json;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
}

function triggerPreviewImport() {

    if (input) input.click();

function handlePreviewImport(event) {
    const input = event.target;
    const files = Array.from(input.files || []);
    if (!files.length) return;

    const processFiles = () => {
        const filePromises = files.map(file => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const parsed = JSON.parse(reader.result);
                        resolve({ success: true, data: parsed, file: file.name });
                    } catch (err) {
                        resolve({ success: false, error: err.message, file: file.name });
                    }
                };
                reader.onerror = () => resolve({ success: false, error: "Gagal membaca file", file: file.name });
                reader.readAsText(file);
            });
        });

        Promise.all(filePromises).then(results => {
            input.value = '';
            let validContexts = [];
            let skippedFiles = 0;
            let invalidFormatFiles = 0;

            results.forEach(res => {
                if (!res.success || !res.data || !Array.isArray(res.data.rows)) {
                    invalidFormatFiles++;
                    return;
                }
                const context = res.data;
                if (context.surveyId && typeof currentSurveyId !== 'undefined' && currentSurveyId && context.surveyId !== currentSurveyId) {
                    skippedFiles++;
                    return;
                }
                if (context.periodId && typeof currentPeriodId !== 'undefined' && currentPeriodId && context.periodId !== currentPeriodId) {
                    skippedFiles++;
                    return;
                }
                validContexts.push(context);
            });

            if (!validContexts.length) {
                let errMsg = 'Tidak ada file valid yang dapat diimpor.';
                if (skippedFiles > 0) errMsg += ` (${skippedFiles} file dilewati karena beda survei/periode).`;
                if (invalidFormatFiles > 0) errMsg += ` (${invalidFormatFiles} file format salah).`;
                Swal.fire('Impor Gagal', errMsg, 'error');
                return;
            }

            const rowMap = new Map();
            let isFullFetchedMerged = false;

            validContexts.forEach(ctx => {
                if (ctx.isFullFetched) isFullFetchedMerged = true;
                (ctx.rows || []).forEach(row => {
                    const key = row.sample_id || row.id_sls || JSON.stringify(row);
                    if (!rowMap.has(key)) {
                        rowMap.set(key, row);
                    } else {
                        const existing = rowMap.get(key);
                        if (row.modified && existing.modified && row.modified > existing.modified) {
                            rowMap.set(key, row);
                        }
                    }
                });
            });

            const mergedRows = Array.from(rowMap.values());
            const firstValidCtx = validContexts[0];
            const mergedContext = {
                ...firstValidCtx,
                rows: mergedRows,
                isFullFetched: isFullFetchedMerged
            };

            applyPreviewContext(mergedContext);

            let msg = `Berhasil mengimpor & menggabungkan ${mergedRows.length} data dari ${validContexts.length} file.`;
            if (skippedFiles > 0) msg += `\n${skippedFiles} file dilewati (beda survei/periode).`;
            Swal.fire({
                icon: 'success',
                title: 'Penggabungan Berhasil',
                text: msg,
                timer: 4000,
                showConfirmButton: true
            });
        });
    };

    if (lastFetchedRows.length) {
        Swal.fire({
            title: 'Timpa Data?',
            text: 'Data yang tampil sekarang akan diganti dengan data gabungan file yang Anda pilih. Lanjutkan?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Ya, gabungkan',
            cancelButtonText: 'Batal'
        }).then(result => {
            if (result.isConfirmed) processFiles();
            else input.value = '';
        });
    } else {
        processFiles();
    }
}

function applyPreviewContext(context) {
    if (!context || !Array.isArray(context.rows)) {
        throw new Error('Format preview tidak valid.');
    }
    if (context.surveyId && typeof currentSurveyId !== 'undefined' && currentSurveyId && context.surveyId !== currentSurveyId) {
        throw new Error('Preview ini berasal dari survei lain.');
    }
    if (context.periodId && typeof currentPeriodId !== 'undefined' && currentPeriodId && context.periodId !== currentPeriodId) {
        throw new Error('Preview ini berasal dari periode lain.');
    }

    previewContext = context;
    setDatasetSource(context.rows, !!context.isFullFetched);
    if (typeof liveCountCache !== 'undefined') {
        Object.keys(liveCountCache).forEach(k => delete liveCountCache[k]);
    }

    document.getElementById('btnClearCache').style.display = 'inline-block';
    buildDynamicTableHeaders();
    renderSampelRows(context.rows);
    if (typeof updateDropdownLocalCounts === 'function') {
        updateDropdownLocalCounts();
    }
    updateFetchButtonState();

    const badge = document.getElementById('sampelBadge');
    if (badge) badge.textContent = `${context.rows.length} Data (Imported)`;
}



function downloadPetugasPreview() {
    if (!petugasData) { alert('Data petugas belum dimuat.'); return; }
    const activeTab = document.querySelector('.tab-pane-petugas:not(.d-none)');
    if (!activeTab) return;
    const roleKey = activeTab.id.replace('tab-', '');
    const role    = (petugasData.roles || []).find(r => r.key === roleKey);
    const rows    = (petugasData.data || {})[roleKey] || [];
    const label   = role ? role.label : roleKey;
    const headers = ['No','Nama','Email','Wilayah'];
    const keys    = ['no','nama','email','wilayah'];
    const csv = [headers.join(','), ...rows.map(r => keys.map(k => `"${String(r[k]??'').replace(/"/g,'""')}"`).join(','))].join('\n');
    _triggerCsvDownload(csv, `petugas_${label}_${_fmtTs()}.csv`);
}

    Swal.fire({

        if (!res.ok) {
            return res.json().then(err => { throw new Error(err.error || 'Gagal mengambil data rekap.'); });

        }

            'Kode SLS',

            'Approved by Pengawas',
            'Rejected by Pengawas',
            'Submitted Respondent',
            'Total'
        ];
        const rows = data.map((r, i) => [
            i + 1,
            r.nama,
            r.kode_sls,
            r.open,
            r.draft,
            r.submitted_pencacah,
            r.approved_pengawas,
            r.rejected_pengawas,
            r.submitted_respondent,

        const csvContent = [
            headers.join(','),
            ...rows.map(row => row.map(v => `"${String(v ?? '').replace(/"/g, '""')}"`).join(','))
        ].join('\n');
        
        _triggerCsvDownload(csvContent, `rekap_lapangan_petugas_${surveyName}_${_fmtTs()}.csv`);
    })
    .catch(err => {
        Swal.close();
        Swal.fire('Error', err.message || 'Terjadi kesalahan saat mengunduh.', 'error');
    });
}

function downloadMetadata() {
    if (!surveyName) { alert('Pilih survei terlebih dahulu.'); return; }
    const rows = [];
    document.querySelectorAll('#tab-metadata table tbody tr').forEach(tr => {
        const th = tr.querySelector('th');
        const td = tr.querySelector('td');
        if (th && td) rows.push([th.innerText.trim(), td.innerText.trim()]);
    });
    const csv = ['Field,Nilai', ...rows.map(r => r.map(v => `"${v.replace(/"/g,'""')}"`).join(','))].join('\n');
    _triggerCsvDownload(csv, `metadata_${surveyName}_${_fmtTs()}.csv`);
}

function _triggerCsvDownload(csvContent, filename) {
    const BOM = '\uFEFF';
    const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
}

async function processBulkAction(actionType) {
    if (!currentPeriodId) {
        await Swal.fire({ icon: 'warning', title: 'Pilih survei dulu', text: 'Pilih survei terlebih dahulu.' });
        return;
    }

    const checkedCbs = document.querySelectorAll('.row-cb:checked');
    if (checkedCbs.length === 0) return;

    const assignmentIds = Array.from(checkedCbs).map(cb => cb.value);
    const nTarget = assignmentIds.length;
    const isApprove = actionType === 'approve';
    const actionLabel = isApprove ? 'Approve' : 'Reject';
    const endpoint = isApprove ? '/fasihsm-fetcher/api/auto-approve' : '/fasihsm-fetcher/api/bulk-reject';

    const confirmResult = await Swal.fire({
        title: `Konfirmasi ${actionLabel}`,
        text: `Anda yakin akan me-${actionLabel.toLowerCase()} ${nTarget} data yang dipilih?`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: `Ya, ${actionLabel}`,
        cancelButtonText: 'Batal',
        reverseButtons: true
    });

    if (!confirmResult.isConfirmed) return;

    const stopBtn = document.getElementById('btnStopApprove');
    const btnApprove = document.getElementById('btnAutoApprove');
    const btnReject = document.getElementById('btnBulkReject');
    const progress = document.getElementById('approveProgress');
    const refreshBtn = document.getElementById('btnRefreshStatus');

    stopBtn.style.display = 'inline-block';
    btnApprove.disabled = true;
    btnReject.disabled = true;
    if (refreshBtn) refreshBtn.disabled = true;
    progress.style.display = 'none';
    progress.textContent = 'Menyiapkan...';
    showProgress(true, 'Menyiapkan...', 0);

    fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            period_id: currentPeriodId,
            assignment_ids: assignmentIds
        })
    })
    .then(res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        async function read() {
            return reader.read().then(async ({ done, value }) => {
                if (done) return;

                buffer += decoder.decode(value, { stream: true });
                const parts = buffer.split('\n\n');
                buffer = parts.pop();

                for (const part of parts) {
                    const line = part.replace(/^data: /, '').trim();
                    if (!line) continue;

                    try {
                        const msg = JSON.parse(line);

                        if (msg.progress !== undefined) {
                            progress.textContent = `${msg.progress}/${msg.total} | gagal ${msg.failed}`;
                            const pct = msg.total ? (Number(msg.progress) / Number(msg.total)) * 100 : 0;
                            showProgress(true, `${actionLabel}: ${msg.progress}/${msg.total} (gagal ${msg.failed})`, pct);
                        }

                        if (msg.done) {
                            document.getElementById('btnStopApprove').style.display = 'none';
                            showProgress(false);

                            if (msg.stopped) {
                                progress.textContent = `Dihentikan. Sukses ${msg.success}/${msg.total}, gagal ${msg.failed_count}`;
                                await Swal.fire({
                                    icon: 'info',
                                    title: 'Proses dihentikan',
                                    text: `Sukses: ${msg.success}\nGagal: ${msg.failed_count}`
                                });
                            } else if (msg.error) {
                                await Swal.fire({
                                    icon: 'error',
                                    title: 'Error',
                                    text: msg.error
                                });
                            } else {
                                let text = `Sukses: ${msg.success}\nGagal: ${msg.failed_count}`;
                                if (msg.first_error) {
                                    text += `\n\nContoh gagal:\n${msg.first_error.assignment_id}\n${msg.first_error.message}`;
                                }
                                progress.textContent = `Selesai ✓ ${msg.success}/${msg.total}, gagal ${msg.failed_count}`;
                                await Swal.fire({
                                    icon: 'success',
                                    title: `${actionLabel} selesai`,
                                    text
                                });
                            }

                            btnApprove.disabled = false;
                            btnReject.disabled = false;
                            if (refreshBtn) refreshBtn.disabled = false;
                        }
                    } catch (e) {}
                }

                return read();
            });
        }

        return read();
    })
    .catch(err => {
        Swal.fire({
            icon: 'error',
            title: `Gagal ${actionLabel.toLowerCase()}`,
            text: String(err)
        });
        btnApprove.disabled = false;
        btnReject.disabled = false;
        if (refreshBtn) refreshBtn.disabled = false;
        progress.style.display = 'none';
        document.getElementById('btnStopApprove').style.display = 'none';
        showProgress(false);
    });
}

function autoApprove() { processBulkAction('approve'); }
function bulkReject() { processBulkAction('reject'); }

function stopApprove() {
    if (!currentPeriodId) return;
    
    const stopBtn = document.getElementById('btnStopApprove');
    stopBtn.disabled = true;
    stopBtn.textContent = 'Menghentikan...';
    fetch('/fasihsm-fetcher/api/approve-stop', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({period_id: currentPeriodId})
    })
    .catch(err => {
        console.error('Stop request error:', err);
        stopBtn.disabled = false;
        stopBtn.textContent = 'Stop';
    });
}

let lastCheckedRowIndex = -1;

document.addEventListener('change', function(e) {
    if (e.target.id === 'checkAllRows') {
        const checked = e.target.checked;
        const cbs = document.querySelectorAll('.row-cb');
        cbs.forEach(cb => cb.checked = checked);
        updateBulkButtons();
    } else if (e.target.classList.contains('row-cb')) {
        updateBulkButtons();
    }
});

document.addEventListener('click', function(e) {
    if (e.target.classList.contains('row-cb')) {
        const cbs = Array.from(document.querySelectorAll('.row-cb'));
        const currentIndex = cbs.indexOf(e.target);
        
        if (e.shiftKey && lastCheckedRowIndex !== -1) {
            const start = Math.min(lastCheckedRowIndex, currentIndex);
            const end = Math.max(lastCheckedRowIndex, currentIndex);
            const isChecked = e.target.checked;
            for (let i = start; i <= end; i++) {
                cbs[i].checked = isChecked;
            }
            updateBulkButtons();
        }
        lastCheckedRowIndex = currentIndex;
    }
});

function updateBulkButtons() {
    const checkedCount = document.querySelectorAll('.row-cb:checked').length;
    const btnApprove = document.getElementById('btnAutoApprove');
    const btnReject = document.getElementById('btnBulkReject');
    
    if (checkedCount > 0) {
        btnApprove.style.display = 'inline-block';
        btnApprove.textContent = `Bulk Approve (${checkedCount})`;
        btnReject.style.display = 'inline-block';
        btnReject.textContent = `Bulk Reject (${checkedCount})`;
    } else {
        btnApprove.style.display = 'none';
        btnReject.style.display = 'none';
        document.getElementById('checkAllRows').checked = false;
    }
}
