<script>
// ==========================================
// TABLE ACTIONS, BULK APPROVE, & EXPORT
// ==========================================

function downloadDetail() {
    if (!lastFetchedIds.length) { alert('Tampilkan ringkasan sampel dulu.'); return; }
    const btn      = document.getElementById('btnDownloadDetail');
    const progress = document.getElementById('downloadProgress');
    const total    = lastFetchedIds.length;
    btn.disabled = true;
    progress.textContent = '0/' + total;
    progress.style.display = 'none';
    showProgress(true, 'Menyiapkan unduhan...', 0);
    fetch('/fasihsm-fetcher/api/sampel-detail-csv', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({sample_ids: lastFetchedIds, survey_name: surveyName})
    })
    .then(res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        function read() {
            return reader.read().then(({done, value}) => {
                if (done) return;
                buffer += decoder.decode(value, {stream: true});
                const parts = buffer.split('\n\n');
                buffer = parts.pop();
                for (const part of parts) {
                    const line = part.replace(/^data: /, '').trim();
                    if (!line) continue;
                    try {
                        const msg = JSON.parse(line);
                        if (msg.progress !== undefined) {
                            progress.textContent = msg.progress + '/' + total;
                            const pct = total ? (Number(msg.progress) / total) * 100 : 0;
                            showProgress(true, `Mengunduh detail sampel: ${msg.progress}/${total}`, pct);
                        }
                        if (msg.done) {
                            if (msg.error) {
                                alert('Error: ' + msg.error);
                                btn.disabled = false;
                                showProgress(false);
                            } else {
                                progress.textContent = total + '/' + total + ' ✓';
                                showProgress(true, `Selesai: ${total}/${total} ✓`, 100);
                                setTimeout(() => { showProgress(false); }, 3000);
                                window.location.href = `/fasihsm-fetcher/api/sampel-detail-download/${msg.token}`;
                                setTimeout(() => { btn.disabled = false; }, 2000);
                            }
                        }
                    } catch(e) {}
                }
                return read();
            });
        }
        return read();
    })
    .catch(err => {
        alert('Gagal download: ' + err);
        btn.disabled = false;
        progress.style.display = 'none';
        showProgress(false);
    });
}

function downloadPreview() {
    if (!lastFetchedRows.length) { alert('Tampilkan data terlebih dahulu.'); return; }
    const context = getCurrentPreviewContext();
    _triggerCsvDownload(buildPreviewCsv(context), `${surveyName}_preview.csv`);
}

function triggerPreviewImport() {
    const input = document.getElementById('previewImportInput');
    if (input) input.click();
}

function handlePreviewImport(event) {
    const input = event.target;
    const file = input.files && input.files[0];
    if (!file) return;

    const loadFile = () => {
        const reader = new FileReader();
        reader.onload = () => {
            try {
                const context = parsePreviewCsv(reader.result);
                applyPreviewContext(context);
            } catch (err) {
                alert('Gagal membaca preview: ' + err.message);
            } finally {
                input.value = '';
            }
        };
        reader.onerror = () => {
            alert('Gagal membaca file preview.');
            input.value = '';
        };
        reader.readAsText(file);
    };

    if (lastFetchedRows.length) {
        Swal.fire({
            title: 'Timpa Data?',
            text: 'Data anda yang sekarang akan ditimpa. Apakah anda yakin?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Ya, timpa',
            cancelButtonText: 'Batal'
        }).then(result => {
            if (result.isConfirmed) loadFile();
            else input.value = '';
        });
    } else {
        loadFile();
    }
}

function applyPreviewContext(context) {
    if (!context || !Array.isArray(context.rows)) {
        throw new Error('Format preview tidak valid.');
    }
    if (context.surveyId && typeof currentSurveyId !== 'undefined' && currentSurveyId && context.surveyId !== currentSurveyId) {
        throw new Error('Preview ini berasal dari survei lain.');
    }
    if (context.periodId && typeof currentPeriodId !== 'undefined' && currentPeriodId && context.periodId !== currentPeriodId) {
        throw new Error('Preview ini berasal dari periode lain.');
    }

    previewContext = context;
    setDatasetSource(context.rows, !!context.isFullFetched);
    if (typeof liveCountCache !== 'undefined') {
        Object.keys(liveCountCache).forEach(k => delete liveCountCache[k]);
    }

    document.getElementById('btnClearCache').style.display = 'inline-block';
    buildDynamicTableHeaders();
    renderSampelRows(context.rows);
    if (typeof updateDropdownLocalCounts === 'function') {
        updateDropdownLocalCounts();
    }
    updateFetchButtonState();

    const badge = document.getElementById('sampelBadge');
    if (badge) badge.textContent = `${context.rows.length} Data (Imported)`;
}

function previewCsvColumns() {
    const cols = [
        'no', 'id_sls', 'status_dok', 'pencacah', 'email_pcj', 'created', 'modified',
        'sample_id', 'assignment_id', 'lat', 'lon', 'userId', 'statusAlias'
    ];
    for (let i = 1; i <= 10; i++) cols.push(`data${i}`);
    for (let i = 1; i <= 10; i++) cols.push(`region${i}`);
    for (let i = 1; i <= 10; i++) cols.push(`regionCode${i}`);
    return cols;
}

function csvCell(value) {
    return `"${String(value ?? '').replace(/"/g, '""')}"`;
}

function buildPreviewCsv(context) {
    const cols = previewCsvColumns();
    const meta = {
        format: 'FASIHSM_PREVIEW_CSV',
        version: context.version || 1,
        exportedAt: context.exportedAt || new Date().toISOString(),
        surveyId: context.surveyId || '',
        periodId: context.periodId || '',
        surveyName: context.surveyName || surveyName || '',
        isFullFetched: context.isFullFetched ? 'true' : 'false',
        totalRows: context.rows ? context.rows.length : 0
    };

    const lines = Object.entries(meta).map(([k, v]) => `# ${k}=${String(v).replace(/\r?\n/g, ' ')}`);
    lines.push(cols.map(csvCell).join(','));

    (context.rows || []).forEach(r => {
        const flat = {};
        cols.forEach(c => flat[c] = r[c] ?? '');
        for (let i = 1; i <= 10; i++) {
            flat[`region${i}`] = r.regions && r.regions[i - 1] ? r.regions[i - 1] : '';
            flat[`regionCode${i}`] = r.regionCodes && r.regionCodes[`level${i}`] ? r.regionCodes[`level${i}`] : '';
        }
        lines.push(cols.map(c => csvCell(flat[c])).join(','));
    });

    return lines.join('\n');
}

function parseCsvLine(line) {
    const out = [];
    let cur = '';
    let quoted = false;
    for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (quoted) {
            if (ch === '"' && line[i + 1] === '"') {
                cur += '"';
                i++;
            } else if (ch === '"') {
                quoted = false;
            } else {
                cur += ch;
            }
        } else if (ch === '"') {
            quoted = true;
        } else if (ch === ',') {
            out.push(cur);
            cur = '';
        } else {
            cur += ch;
        }
    }
    out.push(cur);
    return out;
}

function parsePreviewCsv(text) {
    const lines = String(text || '').replace(/^\uFEFF/, '').split(/\r?\n/).filter(line => line.trim() !== '');
    const meta = {};
    const dataLines = [];

    lines.forEach(line => {
        if (line.startsWith('#')) {
            const raw = line.slice(1).trim();
            const eq = raw.indexOf('=');
            if (eq > -1) meta[raw.slice(0, eq).trim()] = raw.slice(eq + 1).trim();
        } else {
            dataLines.push(line);
        }
    });

    if (!dataLines.length) throw new Error('CSV preview kosong.');
    if (meta.format && meta.format !== 'FASIHSM_PREVIEW_CSV') throw new Error('Format CSV preview tidak dikenali.');

    const headers = parseCsvLine(dataLines[0]);
    const rows = dataLines.slice(1).map(line => {
        const vals = parseCsvLine(line);
        const rawRow = {};
        headers.forEach((h, i) => rawRow[h] = vals[i] ?? '');

        const getField = (keys) => {
            for (const k of keys) {
                if (rawRow[k] !== undefined) return rawRow[k];
                const foundKey = Object.keys(rawRow).find(rk => rk.toLowerCase().replace(/[\s_-]/g, '') === k.toLowerCase().replace(/[\s_-]/g, ''));
                if (foundKey !== undefined) return rawRow[foundKey];
            }
            return '';
        };

        const row = {};
        row.no = Number(getField(['no'])) || 0;
        row.id_sls = getField(['id_sls', 'idsls']);
        row.status_dok = getField(['status_dok', 'statusdok', 'status_dokumen', 'statusdokumen']);
        row.pencacah = getField(['pencacah', 'petugas_terakhir', 'petugas-terakhir', 'petugasterakhir']);
        row.email_pcj = getField(['email_pcj', 'emailpcj']);
        row.created = getField(['created', 'dibuat']);
        row.modified = getField(['modified', 'dimodifikasi']);
        row.sample_id = getField(['sample_id', 'sampleid']);
        row.assignment_id = getField(['assignment_id', 'assignmentid']) || row.sample_id;
        
        const latVal = getField(['lat', 'latitude']);
        const lonVal = getField(['lon', 'longitude']);
        row.lat = latVal === '' ? 0 : Number(latVal);
        row.lon = lonVal === '' ? 0 : Number(lonVal);
        
        row.userId = getField(['userId', 'userid']);
        row.statusAlias = getField(['statusAlias', 'statusalias']) || row.status_dok;
        
        for (let i = 1; i <= 10; i++) {
            row[`data${i}`] = getField([`data${i}`]);
        }

        row.regions = [];
        row.regionCodes = {};
        for (let i = 1; i <= 10; i++) {
            const regionValue = getField([`region${i}`]);
            const codeValue = getField([`regionCode${i}`, `regioncode${i}`]);
            if (regionValue) row.regions.push(regionValue);
            if (codeValue) row.regionCodes[`level${i}`] = codeValue;
        }

        return row;
    });

    return {
        version: Number(meta.version) || 1,
        exportedAt: meta.exportedAt || '',
        surveyId: meta.surveyId || '',
        periodId: meta.periodId || '',
        surveyName: meta.surveyName || 'rincian_sampel',
        rows,
        isFullFetched: meta.isFullFetched === 'true',
        totalRows: rows.length
    };
}

function downloadPetugasPreview() {
    if (!petugasData) { alert('Data petugas belum dimuat.'); return; }
    const activeTab = document.querySelector('.tab-pane-petugas:not(.d-none)');
    if (!activeTab) return;
    const roleKey = activeTab.id.replace('tab-', '');
    const role    = (petugasData.roles || []).find(r => r.key === roleKey);
    const rows    = (petugasData.data || {})[roleKey] || [];
    const label   = role ? role.label : roleKey;
    const headers = ['No','Nama','Email','Wilayah'];
    const keys    = ['no','nama','email','wilayah'];
    const csv = [headers.join(','), ...rows.map(r => keys.map(k => `"${String(r[k]??'').replace(/"/g,'""')}"`).join(','))].join('\n');
    _triggerCsvDownload(csv, `petugas_${label}.csv`);
}

function downloadPetugasAll() {
    if (!petugasData) { alert('Data petugas belum dimuat.'); return; }
    const headers = ['Role','No','Nama','Email','Wilayah'];
    const rows = [];
    (petugasData.roles || []).forEach(role => {
        (petugasData.data[role.key] || []).forEach(p => {
            rows.push([role.label, p.no, p.nama, p.email, p.wilayah]);
        });
    });
    const csv = [headers.join(','), ...rows.map(r => r.map(v => `"${String(v??'').replace(/"/g,'""')}"`).join(','))].join('\n');
    _triggerCsvDownload(csv, `petugas_semua_role.csv`);
}

function downloadMetadata() {
    if (!surveyName) { alert('Pilih survei terlebih dahulu.'); return; }
    const rows = [];
    document.querySelectorAll('#tab-metadata table tbody tr').forEach(tr => {
        const th = tr.querySelector('th');
        const td = tr.querySelector('td');
        if (th && td) rows.push([th.innerText.trim(), td.innerText.trim()]);
    });
    const csv = ['Field,Nilai', ...rows.map(r => r.map(v => `"${v.replace(/"/g,'""')}"`).join(','))].join('\n');
    _triggerCsvDownload(csv, `metadata_${surveyName}.csv`);
}

function _triggerCsvDownload(csvContent, filename) {
    const BOM = '\uFEFF';
    const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
}

async function processBulkAction(actionType) {
    if (!currentPeriodId) {
        await Swal.fire({ icon: 'warning', title: 'Pilih survei dulu', text: 'Pilih survei terlebih dahulu.' });
        return;
    }

    const checkedCbs = document.querySelectorAll('.row-cb:checked');
    if (checkedCbs.length === 0) return;

    const assignmentIds = Array.from(checkedCbs).map(cb => cb.value);
    const nTarget = assignmentIds.length;
    const isApprove = actionType === 'approve';
    const actionLabel = isApprove ? 'Approve' : 'Reject';
    const endpoint = isApprove ? '/fasihsm-fetcher/api/auto-approve' : '/fasihsm-fetcher/api/bulk-reject';

    const confirmResult = await Swal.fire({
        title: `Konfirmasi ${actionLabel}`,
        text: `Anda yakin akan me-${actionLabel.toLowerCase()} ${nTarget} data yang dipilih?`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: `Ya, ${actionLabel}`,
        cancelButtonText: 'Batal',
        reverseButtons: true
    });

    if (!confirmResult.isConfirmed) return;

    const stopBtn = document.getElementById('btnStopApprove');
    const btnApprove = document.getElementById('btnAutoApprove');
    const btnReject = document.getElementById('btnBulkReject');
    const progress = document.getElementById('approveProgress');
    const refreshBtn = document.getElementById('btnRefreshStatus');

    stopBtn.style.display = 'inline-block';
    btnApprove.disabled = true;
    btnReject.disabled = true;
    if (refreshBtn) refreshBtn.disabled = true;
    progress.style.display = 'none';
    progress.textContent = 'Menyiapkan...';
    showProgress(true, 'Menyiapkan...', 0);

    fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            period_id: currentPeriodId,
            assignment_ids: assignmentIds
        })
    })
    .then(res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        async function read() {
            return reader.read().then(async ({ done, value }) => {
                if (done) return;

                buffer += decoder.decode(value, { stream: true });
                const parts = buffer.split('\n\n');
                buffer = parts.pop();

                for (const part of parts) {
                    const line = part.replace(/^data: /, '').trim();
                    if (!line) continue;

                    try {
                        const msg = JSON.parse(line);

                        if (msg.progress !== undefined) {
                            progress.textContent = `${msg.progress}/${msg.total} | gagal ${msg.failed}`;
                            const pct = msg.total ? (Number(msg.progress) / Number(msg.total)) * 100 : 0;
                            showProgress(true, `${actionLabel}: ${msg.progress}/${msg.total} (gagal ${msg.failed})`, pct);
                        }

                        if (msg.done) {
                            document.getElementById('btnStopApprove').style.display = 'none';
                            showProgress(false);

                            if (msg.stopped) {
                                progress.textContent = `Dihentikan. Sukses ${msg.success}/${msg.total}, gagal ${msg.failed_count}`;
                                await Swal.fire({
                                    icon: 'info',
                                    title: 'Proses dihentikan',
                                    text: `Sukses: ${msg.success}\nGagal: ${msg.failed_count}`
                                });
                            } else if (msg.error) {
                                await Swal.fire({
                                    icon: 'error',
                                    title: 'Error',
                                    text: msg.error
                                });
                            } else {
                                let text = `Sukses: ${msg.success}\nGagal: ${msg.failed_count}`;
                                if (msg.first_error) {
                                    text += `\n\nContoh gagal:\n${msg.first_error.assignment_id}\n${msg.first_error.message}`;
                                }
                                progress.textContent = `Selesai ✓ ${msg.success}/${msg.total}, gagal ${msg.failed_count}`;
                                await Swal.fire({
                                    icon: 'success',
                                    title: `${actionLabel} selesai`,
                                    text
                                });
                            }

                            btnApprove.disabled = false;
                            btnReject.disabled = false;
                            if (refreshBtn) refreshBtn.disabled = false;
                        }
                    } catch (e) {}
                }

                return read();
            });
        }

        return read();
    })
    .catch(err => {
        Swal.fire({
            icon: 'error',
            title: `Gagal ${actionLabel.toLowerCase()}`,
            text: String(err)
        });
        btnApprove.disabled = false;
        btnReject.disabled = false;
        if (refreshBtn) refreshBtn.disabled = false;
        progress.style.display = 'none';
        document.getElementById('btnStopApprove').style.display = 'none';
        showProgress(false);
    });
}

function autoApprove() { processBulkAction('approve'); }
function bulkReject() { processBulkAction('reject'); }

function stopApprove() {
    if (!currentPeriodId) return;
    
    const stopBtn = document.getElementById('btnStopApprove');
    stopBtn.disabled = true;
    stopBtn.textContent = 'Menghentikan...';
    fetch('/fasihsm-fetcher/api/approve-stop', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({period_id: currentPeriodId})
    })
    .catch(err => {
        console.error('Stop request error:', err);
        stopBtn.disabled = false;
        stopBtn.textContent = 'Stop';
    });
}

let lastCheckedRowIndex = -1;

document.addEventListener('change', function(e) {
    if (e.target.id === 'checkAllRows') {
        const checked = e.target.checked;
        const cbs = document.querySelectorAll('.row-cb');
        cbs.forEach(cb => cb.checked = checked);
        updateBulkButtons();
    } else if (e.target.classList.contains('row-cb')) {
        updateBulkButtons();
    }
});

document.addEventListener('click', function(e) {
    if (e.target.classList.contains('row-cb')) {
        const cbs = Array.from(document.querySelectorAll('.row-cb'));
        const currentIndex = cbs.indexOf(e.target);
        
        if (e.shiftKey && lastCheckedRowIndex !== -1) {
            const start = Math.min(lastCheckedRowIndex, currentIndex);
            const end = Math.max(lastCheckedRowIndex, currentIndex);
            const isChecked = e.target.checked;
            for (let i = start; i <= end; i++) {
                cbs[i].checked = isChecked;
            }
            updateBulkButtons();
        }
        lastCheckedRowIndex = currentIndex;
    }
});

function updateBulkButtons() {
    const checkedCount = document.querySelectorAll('.row-cb:checked').length;
    const btnApprove = document.getElementById('btnAutoApprove');
    const btnReject = document.getElementById('btnBulkReject');
    
    if (checkedCount > 0) {
        btnApprove.style.display = 'inline-block';
        btnApprove.textContent = `Bulk Approve (${checkedCount})`;
        btnReject.style.display = 'inline-block';
        btnReject.textContent = `Bulk Reject (${checkedCount})`;
    } else {
        btnApprove.style.display = 'none';
        btnReject.style.display = 'none';
        document.getElementById('checkAllRows').checked = false;
    }
}
</script>
