<script>
// ==========================================
// CORE UI & GLOBAL VARIABLES
// ==========================================
let lastFetchedIds = [];
let lastFetchedRows = [];
let localFilterSourceRows = [];

let globalDataCache = null;
let isFetchAllComplete = false;
let previewContext = null;
let datasetState = {
    sourceRows: [],
    viewBaseRows: [],
    visibleRows: [],
    isFull: false,
    version: 0,
    searchTerm: '',
    sortKey: '',
    sortAsc: true
};

function setDatasetSource(rows, isFull = false) {
    const chkAppend = document.getElementById('chkAppendFilter');
    const shouldAppend = chkAppend ? chkAppend.checked : false;

    let combined = [];
    if (shouldAppend && !isFull) {
        combined = (datasetState.sourceRows || []).concat(rows || []);
    } else {
        combined = rows || [];
    }

    // Deduplicate
    const seen = new Set();
    const deduplicated = [];
    for (const r of combined) {
        if (r && r.sample_id && r.sample_id !== "-") {
            if (!seen.has(r.sample_id)) {
                seen.add(r.sample_id);
                deduplicated.push(r);
            }
        } else {
            deduplicated.push(r);
        }
    }

    // Re-index row numbers
    deduplicated.forEach((r, idx) => {
        r.no = idx + 1;
    });

    datasetState.sourceRows = deduplicated;
    datasetState.viewBaseRows = deduplicated;
    datasetState.visibleRows = deduplicated;
    datasetState.isFull = !!isFull || (shouldAppend ? datasetState.isFull : false);
    datasetState.version += 1;
    localFilterSourceRows = datasetState.sourceRows;
    if (datasetState.isFull) {
        globalDataCache = datasetState.sourceRows;
        isFetchAllComplete = true;
    }
    if (typeof invalidateLocalCountIndex === 'function') {
        invalidateLocalCountIndex();
    }
}

function setDatasetVisible(rows) {
    datasetState.visibleRows = rows || [];
    lastFetchedRows = datasetState.visibleRows;
    lastFetchedIds = datasetState.visibleRows.map(r => r.sample_id).filter(Boolean);
}

function getDatasetFilterSource() {
    return datasetState.isFull && globalDataCache ? globalDataCache : datasetState.sourceRows;
}

function getCurrentPreviewContext() {
    const rows = lastFetchedRows || [];
    const fullRows = globalDataCache || [];
    const exportedFullDataset = !!isFetchAllComplete && fullRows.length === rows.length;
    return {
        version: 1,
        exportedAt: new Date().toISOString(),
        surveyId: typeof currentSurveyId !== 'undefined' ? currentSurveyId : '',
        periodId: typeof currentPeriodId !== 'undefined' ? currentPeriodId : '',
        groupId: typeof currentGroupId !== 'undefined' ? currentGroupId : '',
        level2Id: typeof currentLevel2Id !== 'undefined' ? currentLevel2Id : '',
        level2Code: typeof currentLevel2Code !== 'undefined' ? currentLevel2Code : '',
        surveyName: typeof surveyName !== 'undefined' ? surveyName : 'rincian_sampel',
        customColumns: typeof customColumns !== 'undefined' ? customColumns : [],
        regionLevels: typeof regionLevels !== 'undefined' ? regionLevels : [],
        regionMetadata: typeof regionMetadata !== 'undefined' ? regionMetadata : null,
        petugasData: typeof petugasData !== 'undefined' ? petugasData : null,
        rows: rows,
        isFullFetched: exportedFullDataset,
        totalRows: rows.length
    };
}

function updateFetchButtonState() {
    const btn = document.getElementById('btnFetchSampel');
    if (!btn) return;
    btn.disabled = !!isFetchAllComplete;
    btn.title = isFetchAllComplete ? 'Data sudah lengkap di memori. Filter berjalan lokal.' : '';
}

function clearDataCache() {
    globalDataCache = null;
    isFetchAllComplete = false;
    previewContext = null;
    datasetState = { sourceRows: [], viewBaseRows: [], visibleRows: [], isFull: false, version: datasetState.version + 1, searchTerm: '', sortKey: '', sortAsc: true };
    if (typeof liveCountCache !== 'undefined') {
        Object.keys(liveCountCache).forEach(k => delete liveCountCache[k]);
    }
    if (typeof invalidateLocalCountIndex === 'function') {
        invalidateLocalCountIndex();
    }
    document.getElementById('btnClearCache').style.display = 'none';
    const tbody = document.getElementById('sampelTbody');
    if (tbody) tbody.innerHTML = '<tr><td colspan="30" class="text-center py-4 text-muted"><i>Memori dibersihkan. Silakan klik Tampilkan.</i></td></tr>';
    const badge = document.getElementById('sampelBadge');
    if (badge) badge.style.display = 'none';
    if (typeof updateDownloadButtonsState === 'function') {
        updateDownloadButtonsState(false);
    }
    lastFetchedRows = [];
    localFilterSourceRows = [];
    const searchEl = document.getElementById('tableSearch');
    if (searchEl) {
        searchEl.value = '';
    }
    const alertDiv = document.getElementById('searchKeysNotFoundAlert');
    if (alertDiv) {
        alertDiv.style.setProperty('display', 'none', 'important');
    }
    updateFetchButtonState();
}

function pilihSurvei(surveyId) {
    if (!surveyId) return;
    const goToSurvey = () => {
        if (typeof showGlobalLoader === 'function') showGlobalLoader('Memuat Survei...');
        window.location.href = `/fasihsm-fetcher/listsurvei/${activeCategory}/${surveyId}`;
    };

    const hasSampleData = (lastFetchedRows && lastFetchedRows.length) || (globalDataCache && globalDataCache.length);
    const hasContext = hasSampleData || previewContext || (typeof petugasData !== 'undefined' && petugasData);

    if (hasContext) {
        Swal.fire({
            title: 'Pindah Survei?',
            text: 'Metadata, daftar petugas, dan data sampel pada tampilan ini akan dibersihkan. Jika ingin menghindari fetch ulang, unduh Preview terlebih dahulu dari halaman daftar sampel.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Ya, pindah',
            cancelButtonText: 'Batal'
        }).then(result => {
            if (result.isConfirmed) goToSurvey();
        });
        return;
    }

    goToSurvey();
}

function changePeriod() {
    const sel = document.getElementById('periodSelect');
    if (sel) {
        if (typeof showGlobalLoader === 'function') showGlobalLoader('Mengubah Periode...');
        let newPeriod = sel.value;
        let url = new URL(window.location.href);
        url.searchParams.set("period_id", newPeriod);
        window.location.href = url.toString();
    }
}

function switchTab(key) {
    document.querySelectorAll('.tab-pane-petugas').forEach(el => el.classList.add('d-none'));
    document.querySelectorAll('[id^="btn-"]').forEach(el => {
        el.classList.remove('btn-info', 'active');
        el.classList.add('btn-outline-info');
    });
    document.getElementById('tab-' + key).classList.remove('d-none');
    const btn = document.getElementById('btn-' + key);
    btn.classList.remove('btn-outline-info');
    btn.classList.add('btn-info', 'active');
}

function toggleFilters() {
    const val = document.getElementById('mainFilter').value;
    const gStatus   = document.getElementById('filterStatusGroup');
    const gWilayah  = document.getElementById('filterWilayahGroup');
    const gPencacah = document.getElementById('filterPencacahGroup');

    gStatus.classList.toggle('d-none', val !== 'status');
    gWilayah.classList.toggle('d-none', val !== 'wilayah');
    gPencacah.classList.toggle('d-none', val !== 'pencacah');
    
    if (val === 'status') gStatus.style.display = 'flex'; else gStatus.style.display = 'none';
    if (val === 'wilayah') gWilayah.style.display = 'flex'; else gWilayah.style.display = 'none';
    if (val === 'pencacah') gPencacah.style.display = 'block'; else gPencacah.style.display = 'none';

    if (val === 'wilayah' && typeof initRegionFilters === 'function') {
        initRegionFilters();
    }
    if (val === 'pencacah' && document.getElementById('pencacahMenu').querySelectorAll('input').length <= 1) {
        loadPencacah();
    }
    if (typeof applyLocalSampelFiltersIfCached === 'function') {
        applyLocalSampelFiltersIfCached();
    }
}
</script>
