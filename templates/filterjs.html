<script>
// ==========================================
// FILTERS & DROPDOWNS LOGIC
// ==========================================
let regionMetadata = null;
let regionFiltersInitialized = false;
const liveCountCache = {};
const regionLoadTokens = {};
let localCountIndex = null;
let localCountIndexVersion = -1;
let isFetchInProgress = false;

function setFetchInProgress(state) {
    isFetchInProgress = state;
    if (state) {
        // Invalidate semua token agar loading region yang sedang berjalan berhenti
        Object.keys(regionLoadTokens).forEach(k => regionLoadTokens[k] = (regionLoadTokens[k] || 0) + 1);
    }
}

function invalidateLocalCountIndex() {
    localCountIndex = null;
    localCountIndexVersion = -1;
}

function buildLocalCountIndex() {
    if (localCountIndex && localCountIndexVersion === datasetState.version) return localCountIndex;
    const rows = getLocalCountRows();
    const index = { total: rows.length, status: {}, user: {}, region: {} };
    rows.forEach(row => {
        const status = row.statusAlias || row.status_dok;
        if (status) index.status[status] = (index.status[status] || 0) + 1;
        if (row.userId) index.user[row.userId] = (index.user[row.userId] || 0) + 1;
        Object.entries(row.regionCodes || {}).forEach(([levelKey, code]) => {
            if (!index.region[levelKey]) index.region[levelKey] = {};
            index.region[levelKey][code] = (index.region[levelKey][code] || 0) + 1;
        });
    });
    localCountIndex = index;
    localCountIndexVersion = datasetState.version;
    return index;
}

function liveCountCacheKey(items) {
    const ids = (items || []).map(item => `${item.type}:${item.id}`).sort().join('|');
    return `${currentPeriodId || ''}::${ids}`;
}

function applyCountsToMenu(counts, menuId, btnId, defaultText) {
    const menu = document.getElementById(menuId);
    if (!menu) return;
    
    let allCount = 0;
    menu.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        const val = cb.value;
        if (val !== 'SEMUA' && counts[val] !== undefined) {
            const label = cb.closest('label');
            const checkedAttr = cb.checked ? 'checked' : '';
            const attrs = checkboxDataAttrs(cb);
            const text = getBaseLabelText(label);
            label.dataset.baseLabel = text;
            cb.dataset.fetchCount = counts[val];
            label.innerHTML = `<input type="checkbox" class="form-check-input me-2" value="${val}" ${attrs} data-fetch-count="${counts[val]}" ${checkedAttr}> ${text} (${counts[val]})`;
            allCount += counts[val];
        }
    });
    
    const semuaCb = menu.querySelector('input[value="SEMUA"]');
    if (semuaCb) {
        const label = semuaCb.closest('label');
        const checkedAttr = semuaCb.checked ? 'checked' : '';
        const attrs = checkboxDataAttrs(semuaCb);
        const text = getBaseLabelText(label);
        label.dataset.baseLabel = text;
        label.innerHTML = `<input type="checkbox" class="form-check-input me-2" value="SEMUA" ${attrs} data-fetch-count="${allCount}" ${checkedAttr}> ${text} (${allCount})`;
    }
    
    updateDropdownLocalCounts(menuId);
    updateDropdownText(menuId, btnId, defaultText);
}

function checkboxDataAttrs(cb) {
    return Array.from(cb.attributes)
        .filter(attr => attr.name.startsWith('data-') && attr.name !== 'data-fetch-count')
        .map(attr => `${attr.name}="${String(attr.value).replace(/"/g, '&quot;')}"`)
        .join(' ');
}

function getBaseLabelText(label) {
    if (label.dataset.baseLabel) return label.dataset.baseLabel;
    return label.textContent
        .replace(/\s\(\d+\)\s*$/, '')
        .replace(/\s\(\d+\s+lokal\)\s*$/, '')
        .trim();
}

function getLocalCountRows() {
    if (isFetchAllComplete && globalDataCache) return globalDataCache;
    return localFilterSourceRows || [];
}

function getLocalCountForCheckbox(menuId, cb) {
    const index = buildLocalCountIndex();
    if (!index.total) return null;
    if (cb.value === 'SEMUA') return index.total;

    if (menuId === 'statusMenu') {
        return index.status[cb.value] || 0;
    }
    if (menuId === 'pencacahMenu') {
        return index.user[cb.value] || 0;
    }

    const regionMatch = menuId.match(/^regionMenu_(\d+)$/);
    if (regionMatch) {
        const levelKey = `level${regionMatch[1]}`;
        const code = cb.getAttribute('data-code') || cb.getAttribute('data-full-code') || cb.value;
        return (index.region[levelKey] || {})[code] || 0;
    }

    return null;
}

function getSelectedRegionLevel() {
    if (!regionMetadata) return null;
    const startLevel = currentLevel2Code ? 3 : (typeof currentLevel1Code !== 'undefined' && currentLevel1Code ? 2 : 1);
    for (let i = regionMetadata.levelCount; i >= startLevel; i--) {
        const cbs = Array.from(document.querySelectorAll(`#regionMenu_${i} input[type="checkbox"]:checked`)).filter(cb => cb.value !== 'SEMUA');
        if (cbs.length > 0) {
            return i;
        }
    }
    return null;
}

function updateDropdownLocalCounts(menuId = null) {
    const menuIds = menuId
        ? [menuId]
        : ['statusMenu', 'pencacahMenu', ...Array.from(document.querySelectorAll('[id^="regionMenu_"]')).map(el => el.id)];

    menuIds.forEach(id => {
        const menu = document.getElementById(id);
        if (!menu) return;
        menu.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            const label = cb.closest('label');
            if (!label) return;
            const localCount = getLocalCountForCheckbox(id, cb);
            if (localCount === null) return;
            const checkedAttr = cb.checked ? 'checked' : '';
            const attrs = checkboxDataAttrs(cb);
            const rawText = label.textContent.replace(/\s\(\d+\s+lokal\)\s*$/, '').trim();
            const inferredFetch = rawText.match(/\((\d+)\)\s*$/);
            const fetchCount = cb.getAttribute('data-fetch-count') || (inferredFetch ? inferredFetch[1] : '');
            const fetchText = fetchCount !== null && fetchCount !== '' ? ` (${fetchCount})` : '';
            const text = label.dataset.baseLabel || rawText.replace(/\s\(\d+\)\s*$/, '').trim();
            label.dataset.baseLabel = text;
            label.innerHTML = `<input type="checkbox" class="form-check-input me-2" value="${cb.value}" ${attrs} ${fetchCount ? `data-fetch-count="${fetchCount}"` : ''} ${checkedAttr}> ${text}${fetchText} <span class="text-success">(${localCount} lokal)</span>`;
        });
    });
}

function loadSampelStatus(periodId, regionId = null, regionLevel = null) {
    const menu = document.getElementById('statusMenu');
    if (!menu) return;
    menu.innerHTML = '<li><label class="dropdown-item text-muted">Memuat status...</label></li>';
    let url = `/fasihsm-fetcher/api/sampel-status?period_id=${periodId}`;
    if (regionId) url += `&region_id=${regionId}`;
    if (regionLevel) url += `&region_level=${regionLevel}`;
    fetch(url)
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                menu.innerHTML = '<li><label class="dropdown-item text-muted">Status gagal dimuat. Klik refresh.</label></li>';
                updateDropdownText('statusMenu', 'statusBtn', 'Status belum dimuat');
                toggleFilters();
                return;
            }
            menu.innerHTML = `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Semua (${data.total})</label></li>`;
            (data.statuses || []).forEach(s => {
                menu.innerHTML += `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="${s.keyAggregation}"> ${s.keyAggregation} (${s.docCount})</label></li>`;
            });
            updateDropdownText('statusMenu', 'statusBtn', '— Semua Status —');
            toggleFilters();
        })
        .catch(() => { 
            menu.innerHTML = '<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Semua</label></li>';
            updateDropdownText('statusMenu', 'statusBtn', '— Semua Status —');
            toggleFilters();
        });
}

function refreshSampelStatus() {
    if (!currentPeriodId) {
        alert('Pilih survei terlebih dahulu.');
        return;
    }
    const btn = document.getElementById('btnRefreshStatus');
    btn.disabled = true;
    btn.textContent = '...';
    const regionId = getSelectedRegionId();
    const regionLevel = getSelectedRegionLevel();
    loadSampelStatus(currentPeriodId, regionId, regionLevel);
    setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '↻';
    }, 800);
}

function initRegionFilters() {
    if (!currentGroupId || regionFiltersInitialized) return;
    regionFiltersInitialized = true;
    fetch(`/fasihsm-fetcher/api/proxy/region/metadata?groupId=${currentGroupId}`)
        .then(r => r.json())
        .then(res => {
            if (res.data && res.data.level) {
                regionMetadata = res.data;
                buildWilayahDropdowns();
            }
        });
}

function buildWilayahDropdowns() {
    const container = document.getElementById('dynamicWilayahContainer');
    if (!container || !regionMetadata) return;
    
    container.innerHTML = '';
    const levels = regionMetadata.level;
    const startLevel = currentLevel2Code ? 3 : (typeof currentLevel1Code !== 'undefined' && currentLevel1Code ? 2 : 1);
    
    for (let i = startLevel; i <= regionMetadata.levelCount; i++) {
        const levelData = levels.find(l => l.id === i);
        if (!levelData) continue;
        
        const isFirst = i === startLevel;
        const displayStyle = isFirst ? 'block' : 'none';
        const defaultText = `— Semua ${levelData.name} —`;
        
        const html = `
            <div class="dropdown" id="regionDropdownContainer_${i}" style="display:${displayStyle};">
                <button class="btn btn-outline-secondary bg-body btn-sm dropdown-toggle text-start text-truncate" type="button" id="regionBtn_${i}" data-bs-toggle="dropdown" data-bs-auto-close="outside" style="min-width:150px; max-width: 200px;">
                    ${defaultText}
                </button>
                <ul class="dropdown-menu shadow" id="regionMenu_${i}" style="max-height: 300px; overflow-y: auto;">
                    <li><label class="dropdown-item text-muted"><em>${defaultText}</em></label></li>
                </ul>
            </div>
        `;
        container.innerHTML += html;
    }
    
    for (let i = startLevel; i <= regionMetadata.levelCount; i++) {
        const levelData = levels.find(l => l.id === i);
        if (!levelData) continue;
        
        const onChangeCallback = () => {
            if (i < regionMetadata.levelCount) {
                loadDynamicRegionLevel(i + 1);
            }
            // Cascading: reload pencacah based on selected region
            const regionCode = getSelectedRegionCode();
            loadPencacah(regionCode);
            const regionId = getSelectedRegionId();
            const regionLevel = getSelectedRegionLevel();
            loadSampelStatus(currentPeriodId, regionId, regionLevel);
        };
        attachCheckboxLogic(`regionMenu_${i}`, `regionBtn_${i}`, `— Semua ${levelData.name} —`, onChangeCallback);
    }
    
    loadDynamicRegionLevel(startLevel);
}

function getSelectedRegionCode() {
    if (!regionMetadata) return null;
    const startLevel = currentLevel2Code ? 3 : (typeof currentLevel1Code !== 'undefined' && currentLevel1Code ? 2 : 1);
    for (let i = regionMetadata.levelCount; i >= startLevel; i--) {
        const cbs = Array.from(document.querySelectorAll(`#regionMenu_${i} input[type="checkbox"]:checked`)).filter(cb => cb.value !== 'SEMUA');
        if (cbs.length > 0) {
            const code = cbs[0].getAttribute('data-full-code') || cbs[0].getAttribute('data-code');
            if (code) return code;
        }
    }
    return currentLevel2Code || null;
}

function getSelectedRegionId() {
    if (!regionMetadata) return null;
    const startLevel = currentLevel2Code ? 3 : (typeof currentLevel1Code !== 'undefined' && currentLevel1Code ? 2 : 1);
    for (let i = regionMetadata.levelCount; i >= startLevel; i--) {
        const cbs = Array.from(document.querySelectorAll(`#regionMenu_${i} input[type="checkbox"]:checked`)).filter(cb => cb.value !== 'SEMUA');
        if (cbs.length > 0) {
            return cbs[0].value;
        }
    }
    return null;
}

function loadDynamicRegionLevel(targetLevel) {
    if (!regionMetadata) return;
    // Jangan load region apapun kalau fetch sedang berjalan — jaga kuota request BPS
    if (isFetchInProgress) return;
    // Batasi cascade hanya sampai level 4
    if (targetLevel > 4) return;
    const levelData = regionMetadata.level.find(l => l.id === targetLevel);
    if (!levelData) return;
    
    const menuId = `regionMenu_${targetLevel}`;
    const btnId = `regionBtn_${targetLevel}`;
    const contId = `regionDropdownContainer_${targetLevel}`;
    const defaultText = `— Semua ${levelData.name} —`;
    
    const menu = document.getElementById(menuId);
    const cont = document.getElementById(contId);
    if (!menu || !cont) return;
    
    let parentIds = [];
    if (targetLevel === 1) {
        parentIds = [''];
    } else if (targetLevel === 2 && typeof currentLevel1Code !== 'undefined' && currentLevel1Code) {
        parentIds = [currentLevel1Code];
    } else if (targetLevel === 3 && currentLevel2Code) {
        parentIds = [currentLevel2Code];
    } else {
        const parentMenuId = `regionMenu_${targetLevel - 1}`;
        const parentMenu = document.getElementById(parentMenuId);
        parentIds = Array.from(document.querySelectorAll(`#${parentMenuId} input[type="checkbox"]:checked`))
            .filter(cb => cb.value !== 'SEMUA')
            .map(cb => cb.getAttribute('data-full-code'))
            .filter(Boolean);
        if (parentIds.length === 0 && parentMenu && parentMenu.querySelector('input[value="SEMUA"]:checked')) {
            // Jangan load semua children — terlalu banyak request, bikin WAF ngamuk.
            // User harus pilih wilayah spesifik dulu.
            parentIds = [];
        }
    }
    
    for (let i = targetLevel; i <= regionMetadata.levelCount; i++) {
        regionLoadTokens[i] = (regionLoadTokens[i] || 0) + 1;
        const m = document.getElementById(`regionMenu_${i}`);
        const c = document.getElementById(`regionDropdownContainer_${i}`);
        const b = document.getElementById(`regionBtn_${i}`);
        const lvData = regionMetadata.level.find(l => l.id === i);
        if (c && m && b && lvData) {
            c.style.display = i === targetLevel && parentIds.length > 0 ? 'block' : 'none';
            m.innerHTML = `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Semua ${lvData.name}</label></li>`;
            updateDropdownText(`regionMenu_${i}`, `regionBtn_${i}`, `— Semua ${lvData.name} —`);
        }
    }
    
    if (parentIds.length === 0) return;
    
    const loadToken = regionLoadTokens[targetLevel];
    menu.innerHTML = '<li><label class="dropdown-item text-muted">Memuat...</label></li>';
    const parentParam = targetLevel > 1 ? `level${targetLevel - 1}FullCode` : null;
    
    (async function fetchRegionsSequentially() {
        let responses = [];
        for (const pid of parentIds) {
            if (regionLoadTokens[targetLevel] !== loadToken) return;
            try {
                const r = await fetch(`/fasihsm-fetcher/api/proxy/region/level/${targetLevel}?groupId=${currentGroupId}${parentParam ? `&${parentParam}=${encodeURIComponent(pid)}` : ''}`);
                const ct = r.headers.get('Content-Type') || '';
                if (!r.ok || ct.includes('text/html')) {
                    console.warn('[region-level] WAF atau respons tidak valid, dilewati.');
                    responses.push({ parent: pid, res: { data: [] } });
                } else {
                    const res = await r.json();
                    responses.push({ parent: pid, res });
                }
                // Jeda 200ms antar request biar aman dari WAF
                await new Promise(resolve => setTimeout(resolve, 200));
            } catch (err) {
                console.warn('[region-level] Error fetch:', err);
                responses.push({ parent: pid, res: { data: [] } });
            }
        }

        if (regionLoadTokens[targetLevel] !== loadToken) return;
        menu.innerHTML = `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Semua ${levelData.name}</label></li>`;
        let countItems = [];
        let loadedCount = 0;
        responses.forEach(({ parent, res }) => {
            if (targetLevel >= 5 && (!res.data || res.data.length === 0)) {
                console.warn(`[region-level] Level ${targetLevel} kosong. Cek apakah parameter ${parentParam}=${parent} masih benar untuk API FASIH terbaru.`, res);
            }
            (res.data || []).forEach(d => {
                const fullCode = d.fullCode || d.code || '';
                menu.innerHTML += `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="${d.id}" data-code="${fullCode}" data-full-code="${fullCode}" data-short-code="${d.code || ''}"> [${d.code}] ${d.name}</label></li>`;
                countItems.push({ id: d.id, type: `region${targetLevel}Id` });
                loadedCount++;
            });
        });
        updateDropdownText(menuId, btnId, defaultText);
        updateDropdownLocalCounts(menuId);
        // Hanya cascade sampai level 4 — level 5+ terlalu banyak request, biarkan user pilih manual
        if (loadedCount > 0 && targetLevel < regionMetadata.levelCount && targetLevel < 4) {
            loadDynamicRegionLevel(targetLevel + 1);
        }
    })();
}

function loadPencacah(regionCode) {
    if (!currentPeriodId) return;
    const menu = document.getElementById('pencacahMenu');
    
    // Skip petugasData cache when cascading with specific regionCode
    if (!regionCode && typeof petugasData !== 'undefined' && petugasData && petugasData.data) {
        menu.innerHTML = '<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Semua Petugas</label></li>';
        const seen = new Set();
        let countItems = [];
        const pencacahRoles = (petugasData.roles || []).filter(r => r.isPencacah);
        pencacahRoles.forEach(role => {
            (petugasData.data[role.key] || []).forEach(u => {
                if (!u.userId || seen.has(u.userId)) return;
                seen.add(u.userId);
                menu.innerHTML += `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="${u.userId}"> ${u.nama} (${u.email})</label></li>`;
                countItems.push({ id: u.userId, type: 'user_id' });
            });
        });
        updateDropdownText('pencacahMenu', 'pencacahBtn', '— Semua Petugas —');
        if (countItems.length > 0) updateLiveCounts(countItems, 'pencacahMenu', 'pencacahBtn', '— Semua Petugas —');
        if (seen.size > 0) return; 
    }

    menu.innerHTML = '<li><label class="dropdown-item text-muted">Memuat petugas...</label></li>';
    let url = `/fasihsm-fetcher/api/proxy/users?surveyPeriodId=${currentPeriodId}&surveyId=${currentSurveyId}`;
    const effectiveRegionCode = regionCode || currentLevel2Code;
    if (effectiveRegionCode) url += `&regionCode=${effectiveRegionCode}`;

    fetch(url)
        .then(r => {
            const ct = r.headers.get('Content-Type') || '';
            if (!r.ok || ct.includes('text/html')) {
                console.warn('[loadPencacah] WAF atau respons tidak valid, dilewati.');
                return null;
            }
            return r.json();
        })
        .then(res => {
            if (!res) return;
            menu.innerHTML = '<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Semua Petugas</label></li>';
            const seen = new Set();
            let countItems = [];
            (res.data || []).forEach(u => {
                if (seen.has(u.userId)) return;
                seen.add(u.userId);
                menu.innerHTML += `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="${u.userId}"> ${u.username} (${u.email})</label></li>`;
                countItems.push({ id: u.userId, type: 'user_id' });
            });
            updateDropdownText('pencacahMenu', 'pencacahBtn', '— Semua Petugas —');
            updateLiveCounts(countItems, 'pencacahMenu', 'pencacahBtn', '— Semua Petugas —');
        })
        .catch(() => { 
            menu.innerHTML = '<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Gagal memuat</label></li>'; 
            updateDropdownText('pencacahMenu', 'pencacahBtn', '— Semua Petugas —');
        });
}

function getSelectedValues(menuId) {
    const menu = document.getElementById(menuId);
    if (!menu) return [];
    const checked = Array.from(menu.querySelectorAll('input[type="checkbox"]:checked'));
    const vals = checked.map(cb => cb.value);
    if (vals.includes('SEMUA') && vals.length === 1) return ['SEMUA'];
    return vals.filter(v => v !== 'SEMUA');
}

function attachCheckboxLogic(menuId, btnId, defaultText, onChangeCallback = null) {
    const menu = document.getElementById(menuId);
    if (!menu) return;
    
    menu.addEventListener('change', function(e) {
        if (e.target.tagName === 'INPUT' && e.target.type === 'checkbox') {
            const isSemua = e.target.value === 'SEMUA';
            if (isSemua && e.target.checked) {
                menu.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                    if (cb.value !== 'SEMUA') cb.checked = false;
                });
            } else if (!isSemua && e.target.checked) {
                const cbSemua = menu.querySelector('input[value="SEMUA"]');
                if (cbSemua) cbSemua.checked = false;
            }
            
            const checked = menu.querySelectorAll('input[type="checkbox"]:checked');
            if (checked.length === 0) {
                const cbSemua = menu.querySelector('input[value="SEMUA"]');
                if (cbSemua) cbSemua.checked = true;
            }

            updateDropdownText(menuId, btnId, defaultText);
            if (onChangeCallback) onChangeCallback();
            if (typeof applyLocalSampelFiltersIfCached === 'function') {
                applyLocalSampelFiltersIfCached();
            }
        }
    });
}

function updateLiveCounts(items, menuId, btnId, defaultText) {
    if (!items || items.length === 0 || !currentPeriodId) return;
    const key = liveCountCacheKey(items);
    if (liveCountCache[key]) {
        applyCountsToMenu(liveCountCache[key], menuId, btnId, defaultText);
        return;
    }

    fetch('/fasihsm-fetcher/api/proxy/counts', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ period_id: currentPeriodId, items: items })
    })
    .then(r => {
        const ctype = r.headers.get('Content-Type') || '';
        if (!r.ok || ctype.includes('text/html')) {
            console.warn('[live-count] Respons bukan JSON (mungkin WAF challenge), dilewati.');
            return null;
        }
        return r.json();
    })
    .then(counts => {
        if (!counts) return;
        liveCountCache[key] = counts || {};
        applyCountsToMenu(liveCountCache[key], menuId, btnId, defaultText);
    })
    .catch(err => console.warn('[live-count] gagal memuat count', err));
}

function updateDropdownText(menuId, btnId, defaultText) {
    const menu = document.getElementById(menuId);
    const btn = document.getElementById(btnId);
    if (!menu || !btn) return;
    
    const checked = Array.from(menu.querySelectorAll('input[type="checkbox"]:checked'));
    if (checked.length === 0 || (checked.length === 1 && checked[0].value === 'SEMUA')) {
        btn.textContent = defaultText;
    } else {
        const labels = checked.map(cb => cb.closest('label').textContent.trim());
        btn.textContent = labels.join(', ');
    }
}

document.addEventListener('DOMContentLoaded', function() {
    attachCheckboxLogic('statusMenu', 'statusBtn', '— Semua Status —');
    attachCheckboxLogic('pencacahMenu', 'pencacahBtn', '— Semua Petugas —');

    if (typeof currentPeriodId !== 'undefined' && currentPeriodId) {
        loadSampelStatus(currentPeriodId);
    }
    toggleFilters();
});
</script>
