<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Sampel — FASIH SM Fetcher</title>
    <meta name="description" content="Halaman review survei FASIH menggunakan Form Engine resmi BPS.">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Form Engine CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='form-engine.css') }}">

    <!-- Logger Client-side ke Terminal Backend -->
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            fetch('/fasihsm-fetcher/api/log', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: message,
                    source: source,
                    lineno: lineno,
                    colno: colno,
                    error: error ? error.stack : ''
                })
            }).catch(function() {});
            return false;
        };
    </script>

    <!-- Form Engine JS (UMD) -->
    <script src="{{ url_for('static', filename='form-engine.js') }}?v=1.0.3"></script>


    <style>
        :root {
            --brand: #0d6efd;
            --brand-dark: #0847b8;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
        }

        /* ── Top Bar ─────────────────────────────────────────────── */
        #topbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #0d1b3e 0%, #1a3a6b 100%);
            color: #fff;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.4);
        }

        #topbar .brand {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .05em;
            opacity: .7;
            text-transform: uppercase;
        }

        #topbar .divider {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,.25);
        }

        #topbar .assignment-id {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #90caf9;
            word-break: break-all;
        }

        #topbar .ms-auto { margin-left: auto; }

        /* ── Loading / Error State ───────────────────────────────── */
        #stateContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 52px);
            gap: 16px;
            padding: 40px;
        }

        .spinner-ring {
            width: 56px; height: 56px;
            border: 4px solid #dee2e6;
            border-top-color: var(--brand);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .state-label {
            font-size: 14px;
            color: #6c757d;
            text-align: center;
        }

        /* ── Info Panel (header sebelum form) ───────────────────── */
        #infoPanel {
            display: none;
            background: #fff;
            border-bottom: 1px solid #dee2e6;
            padding: 10px 20px;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .info-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            background: #e9ecef;
            color: #495057;
        }

        .info-chip .label { font-weight: 600; color: #343a40; }

        .badge-status {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .03em;
        }

        /* ── Form Container ─────────────────────────────────────── */
        #formWrapper {
            display: none;
            padding: 20px;
        }

        #form-container {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 16px rgba(0,0,0,.08);
            min-height: 200px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
    <span class="brand">FASIH SM Fetcher</span>
    <div class="divider"></div>
    <span>Review Sampel</span>
    <div class="divider"></div>
    <span class="assignment-id" id="topbarAssignmentId">{{ assignment_id }}</span>
    <div class="ms-auto">
        <button class="btn btn-outline-light btn-sm" onclick="window.close()">✕ Tutup</button>
    </div>
</div>

<!-- Info Panel -->
<div id="infoPanel" style="display:flex;">
    <span class="info-chip"><span class="label">Survei:</span> <span id="infoSurvei">—</span></span>
    <span class="info-chip"><span class="label">Versi Template:</span> <span id="infoVersiTpl">—</span></span>
    <span class="info-chip"><span class="label">Status:</span> <span id="infoStatus" class="badge-status bg-secondary text-white">—</span></span>
    <span class="info-chip"><span class="label">Dibuat oleh:</span> <span id="infoCreatedBy">—</span></span>
    <span class="info-chip"><span class="label">Dimodifikasi oleh:</span> <span id="infoUpdatedBy">—</span></span>
</div>

<!-- State Container (loading / error) -->
<div id="stateContainer">
    <div class="spinner-ring" id="spinnerEl"></div>
    <div class="state-label" id="stateLabel">Mengambil data penugasan…</div>
</div>

<!-- Form Engine Mount Point -->
<div id="formWrapper">
    <div id="form-container"></div>
</div>


<script>
    const ASSIGNMENT_ID = "{{ assignment_id }}";

    const stateContainer = document.getElementById('stateContainer');
    const stateLabel     = document.getElementById('stateLabel');
    const spinnerEl      = document.getElementById('spinnerEl');
    const formWrapper    = document.getElementById('formWrapper');
    const infoPanel      = document.getElementById('infoPanel');

    function showError(msg) {
        spinnerEl.style.display = 'none';
        stateLabel.innerHTML = `<div class="alert alert-danger" style="max-width:500px;">`
            + `<strong>Gagal memuat form.</strong><br>${msg}</div>`;
    }

    function showState(msg) {
        stateLabel.textContent = msg;
    }

    function showForm() {
        stateContainer.style.display = 'none';
        infoPanel.style.display = 'flex';
        formWrapper.style.display = 'block';
    }

    /* ---------- helpers ---------- */
    function safeJsonParse(str, fallback = null) {
        try { return JSON.parse(str); } catch { return fallback; }
    }

    /* ---------- patch fetch untuk URL relatif → inject session ---------- */
    // Form engine mungkin mencoba fetch ke BPS langsung; kita tidak bisa
    // intercept itu tanpa proxy. Kita hanya suplai data via config object.

    /* ---------- main ---------- */
    async function init() {
        showState("Mengambil data penugasan…");

        const SURVEY_ID = new URLSearchParams(window.location.search).get('survey_id') || "";

        // 1. Fetch assignment detail via proxy internal
        let assignmentData;
        try {
            const res = await fetch(`/fasihsm-fetcher/api/assignment-detail/${ASSIGNMENT_ID}`);
            const json = await res.json();
            if (!res.ok || !json.success) {
                showError(json.error || json.message || `HTTP ${res.status}`);
                return;
            }
            assignmentData = json.data;
        } catch (e) {
            showError(e.message);
            return;
        }

        // 2. Parse field-field penting
        const preDefinedData = safeJsonParse(assignmentData.pre_defined_data, {});
        const responseData   = safeJsonParse(assignmentData.data, {});
        const commentData    = safeJsonParse(assignmentData.comment, {});

        // 3. Ekstrak template ID & version dari responseData atau cari via BPS API jika tidak ada
        let templateVersion    = responseData.templateVersion || '';
        let validationVersion  = responseData.validationVersion || templateVersion;

        let templateId  = null;
        let templateTitle = assignmentData.code_identity || 'FASIH Survey';
        let templateAcronym = 'FASIH';
        let formMeta    = null;

        // Coba cari dari answers
        if (Array.isArray(responseData.answers)) {
            const hiddenField = responseData.answers.find(a =>
                a.dataKey && a.dataKey.startsWith('var_hiden_pml'));
            if (hiddenField && hiddenField.answer) {
                formMeta = safeJsonParse(hiddenField.answer, null);
                if (formMeta && formMeta.template) {
                    templateId      = formMeta.template.id;
                    templateVersion = formMeta.template.version || templateVersion;
                    validationVersion = formMeta.template.version || validationVersion;
                    templateTitle   = formMeta.template.title || templateTitle;
                    templateAcronym = formMeta.template.acronym || templateAcronym;
                }
            }
        }

        // Jika templateId tidak ditemukan di answers (misal sampel baru yang belum diisi),
        // cari template dari survey-templates menggunakan survey_id
        if (!templateId && SURVEY_ID) {
            showState("Mendapatkan informasi template dari survey...");
            try {
                const res = await fetch(`/fasihsm-fetcher/api/survey-templates/${SURVEY_ID}`);
                const json = await res.json();
                if (res.ok && json.success && Array.isArray(json.data) && json.data.length > 0) {
                    // Cari template yang cocok dengan mode assignment (misal CAPI / CAWI)
                    const assignmentMode = (assignmentData.mode && assignmentData.mode[0]) || 'CAPI';
                    let tplMeta = json.data.find(t => t.mode === assignmentMode);
                    if (!tplMeta) {
                        tplMeta = json.data[0]; // Fallback ke template pertama
                    }
                    if (tplMeta) {
                        templateId = tplMeta.templateId; // note: field templateId dari search response
                        templateVersion = tplMeta.templateVersion;
                        validationVersion = tplMeta.validationVersion || templateVersion;
                        templateTitle = tplMeta.surveyTemplateName || templateTitle;
                        templateAcronym = tplMeta.surveyTemplateName ? tplMeta.surveyTemplateName.split(' ')[0] : templateAcronym;
                    }
                }
            } catch (e) {
                console.error("Gagal mendapatkan template secara dinamis:", e);
            }
        }

        // Update info panel
        document.getElementById('infoSurvei').textContent  = `${templateAcronym} — ${templateTitle}`;
        document.getElementById('infoVersiTpl').textContent = templateVersion || '—';
        document.getElementById('infoStatus').textContent  = assignmentData.assignment_status_alias || '—';
        document.getElementById('infoCreatedBy').textContent = responseData.createdBy || '—';
        document.getElementById('infoUpdatedBy').textContent = responseData.updatedBy || '—';

        // Warna badge status
        const statusBadge = document.getElementById('infoStatus');
        const statusAlias = (assignmentData.assignment_status_alias || '').toLowerCase();
        if (statusAlias.includes('approved')) statusBadge.className = 'badge-status bg-success text-white';
        else if (statusAlias.includes('reject')) statusBadge.className = 'badge-status bg-danger text-white';
        else statusBadge.className = 'badge-status bg-warning text-dark';

        // 4. Fetch template (form structure)
        if (!templateId) {
            showError("Template ID tidak ditemukan dalam data penugasan. Tidak bisa merender form.");
            return;
        }

        showState("Mengambil struktur template survei…");
        let templateObj;
        try {
            const res = await fetch(`/fasihsm-fetcher/api/template-file/${templateId}?version=${encodeURIComponent(templateVersion)}`);
            const json = await res.json();
            if (!res.ok) {
                showError(json.error || `Gagal ambil template: HTTP ${res.status}`);
                return;
            }
            templateObj = json;
        } catch (e) {
            showError("Gagal mengambil template: " + e.message);
            return;
        }

        // 5. Fetch validation rules
        showState("Mengambil aturan validasi…");
        let validationObj = { version: validationVersion, testFunctions: [] };
        try {
            const res = await fetch(
                `/fasihsm-fetcher/api/template-validation/${templateId}?templateVersion=${encodeURIComponent(templateVersion)}&validationVersion=${encodeURIComponent(validationVersion)}`
            );
            if (res.ok) {
                validationObj = await res.json();
            }
        } catch {
            // validasi opsional, lanjutkan tanpa error
        }

        // 6. Bangun config untuk FasihForm
        showState("Merender form survei…");

        // formMode: 1 = entry, 2 = validation, 3 = close, 4 = edit
        const formMode = (formMeta && formMeta.formMode) ? formMeta.formMode : 4;

        const config = {
            mode: assignmentData.source_from || 'CAPI',
            locale: 'id',
            formMode: formMode,
            initialMode: 2,   // 2 = prefill dari preset
            template: templateObj,
            validation: validationObj,
            preset: preDefinedData,
            response: responseData,
            remark: commentData,
            user: formMeta && formMeta.user
                ? formMeta.user
                : { username: responseData.updatedBy || 'viewer', role: 'Pengawas' },
            debug: false
        };

        // 7. Mount FasihForm
        try {
            const FasihFormFactory = window.FasihForm || (window["fasih-form"] && window["fasih-form"].FasihForm);
            if (typeof FasihFormFactory !== 'function') {
                showError("Form engine (FasihForm) tidak terdefinisi di window.");
                return;
            }
            const engine = FasihFormFactory('#form-container', config);
            engine.render();
            showForm();
        } catch (e) {
            showError("Form engine error: " + e.message);
            console.error(e);
        }
    }


    // Load form-engine.js dulu sebelum init
    window.addEventListener('load', init);
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
