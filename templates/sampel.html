<div class="bg-light p-2 border-bottom flex-shrink-0 d-flex flex-wrap align-items-end justify-content-between gap-2">
    <div class="d-flex align-items-end gap-2 flex-wrap" id="filterContainer">
        <div class="col-auto">
            <label class="form-label mb-0 small text-muted">Tampilkan Berdasarkan</label>
            <select id="mainFilter" class="form-select form-select-sm" style="min-width:130px;"
                onchange="toggleFilters()">
                <option value="status">Status</option>
                <option value="wilayah">Wilayah</option>
                <option value="pencacah">Pencacah</option>
            </select>
        </div>

        <div class="col-auto d-flex align-items-end gap-2" id="filterStatusGroup">
            <button id="btnRefreshStatus" class="btn btn-outline-secondary btn-sm" onclick="refreshSampelStatus()"
                title="Refresh status">↻</button>
            <div class="dropdown">
                <button class="btn btn-outline-secondary bg-white btn-sm dropdown-toggle text-start text-truncate" type="button" id="statusBtn" data-bs-toggle="dropdown" data-bs-auto-close="outside" style="min-width:160px; max-width: 200px;">
                    — Pilih survei dulu —
                </button>
                <ul class="dropdown-menu shadow" id="statusMenu" style="max-height: 300px; overflow-y: auto;">
                    <li><label class="dropdown-item text-muted"><em>— Pilih survei dulu —</em></label></li>
                </ul>
            </div>
        </div>

        <div class="col-auto d-flex flex-row align-items-end gap-2 flex-wrap" id="filterWilayahGroup" style="display:none;">
            <!-- Dropdown wilayah akan di-generate secara dinamis oleh surveijs.html -->
            <div id="dynamicWilayahContainer" class="d-flex flex-row align-items-end gap-2 flex-wrap"></div>
        </div>

        <div class="col-auto" id="filterPencacahGroup" style="display:none;">
            <div class="dropdown">
                <button class="btn btn-outline-secondary bg-white btn-sm dropdown-toggle text-start text-truncate" type="button" id="pencacahBtn" data-bs-toggle="dropdown" data-bs-auto-close="outside" style="min-width:200px; max-width: 250px;">
                    — Semua Pencacah —
                </button>
                <ul class="dropdown-menu shadow" id="pencacahMenu" style="max-height: 300px; overflow-y: auto;">
                    <li><label class="dropdown-item text-muted"><em>— Semua Pencacah —</em></label></li>
                </ul>
            </div>
        </div>
    </div>
    <div class="d-flex align-items-end gap-2 flex-wrap">
        <span class="badge bg-info mt-2" id="sampelBadge" style="display:none; height: fit-content;"></span>

        <input type="text" id="tableSearch" class="form-control form-control-sm" placeholder="Cari data..." style="width: 150px; display: none;" onkeyup="handleTableSearch()">
        <input type="file" id="previewImportInput" accept=".csv,text/csv" style="display:none;" onchange="handlePreviewImport(event)">
        <button id="btnUploadPreview" class="btn btn-outline-primary btn-sm" onclick="triggerPreviewImport()">Upload Preview CSV</button>
        <div class="form-check form-switch mb-0 d-inline-flex align-items-center me-2" style="gap: 5px; height: 31px;">
            <input class="form-check-input" type="checkbox" id="chkAppendFilter" style="cursor: pointer;" checked>
            <label class="form-check-label small text-muted" for="chkAppendFilter" style="cursor: pointer; user-select: none;">Append Hasil</label>
        </div>
        <button id="btnFetchSampel" class="btn btn-primary btn-sm" onclick="fetchSampel()">Tampilkan</button>
        <button id="btnStopFetch" class="btn btn-outline-danger btn-sm" onclick="stopFetchSampel()" style="display:none;">Stop Fetch</button>
        <button id="btnClearCache" class="btn btn-secondary btn-sm" onclick="clearDataCache()" style="display:none;">Bersihkan Memori</button>
        <div class="dropdown">
            <button id="btnDownloadDetail" class="btn btn-success btn-sm dropdown-toggle" data-bs-toggle="dropdown"
                data-bs-strategy="fixed" disabled>Unduh</button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#" onclick="downloadDetail(); return false;">⬇ Raw Data (detail per
                        sampel)</a></li>
                <li><a class="dropdown-item" href="#" onclick="downloadPreview(); return false;">⬇ Preview CSV (sesuai
                        tabel)</a></li>
            </ul>
        </div>
        <button id="btnAutoApprove" class="btn btn-warning btn-sm" onclick="autoApprove()" style="display:none;">Bulk Approve</button>
        <button id="btnBulkReject" class="btn btn-danger btn-sm" onclick="bulkReject()" style="display:none;">Bulk Reject</button>
        <button id="btnStopApprove" class="btn btn-secondary btn-sm" onclick="stopApprove()"
            style="display:none;">Stop</button>
        <span id="fetchProgress" class="small text-muted font-monospace" style="display:none;"></span>
        <span id="downloadProgress" class="small text-muted font-monospace" style="display:none;"></span>
        <span id="approveProgress" class="small text-muted font-monospace" style="display:none;"></span>
    </div>
</div>

<div class="flex-grow-1 overflow-auto" style="min-height:0;">
    <table class="table table-hover table-striped mb-0" style="min-width:1100px;">
        <thead class="table-light sticky-top" id="sampelThead">
            <tr>
                <th style="width: 40px; text-align: center;"><input type="checkbox" id="checkAllRows" class="form-check-input"></th>
                <th>No</th>
                <th class="text-nowrap">ID SLS</th>
                <!-- Dynamic columns will be inserted here -->
            </tr>
        </thead>
        <tbody id="sampelTbody">
            <tr>
                <td colspan="17" class="text-center py-4 text-muted"><i>Belum ada data. Klik Tampilkan.</i></td>
            </tr>
        </tbody>
    </table>
</div>
