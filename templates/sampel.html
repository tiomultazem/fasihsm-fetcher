<div class="bg-light p-2 border-bottom flex-shrink-0 d-flex flex-wrap align-items-end justify-content-between gap-2">
    <div class="d-flex align-items-end gap-2 flex-wrap" id="filterContainer">
        <div class="col-auto">
            <label class="form-label mb-0 small text-muted">Tampilkan Berdasarkan</label>
            <select id="mainFilter" class="form-select form-select-sm" style="min-width:130px;"
                onchange="toggleFilters()">
                <option value="status">Status</option>
                <option value="wilayah">Wilayah</option>
                <option value="pencacah">Pencacah</option>
            </select>
        </div>

        <div class="col-auto d-flex align-items-end gap-2" id="filterStatusGroup">
            <button id="btnRefreshStatus" class="btn btn-outline-secondary btn-sm" onclick="refreshSampelStatus()"
                title="Refresh status">↻</button>
            <div class="dropdown">
                <button class="btn btn-outline-secondary bg-white btn-sm dropdown-toggle text-start text-truncate" type="button" id="statusBtn" data-bs-toggle="dropdown" data-bs-auto-close="outside" style="min-width:160px; max-width: 200px;">
                    — Pilih survei dulu —
                </button>
                <ul class="dropdown-menu shadow" id="statusMenu" style="max-height: 300px; overflow-y: auto;">
                    <li><label class="dropdown-item text-muted"><em>— Pilih survei dulu —</em></label></li>
                </ul>
            </div>
        </div>

        <div class="col-auto d-flex flex-row align-items-end gap-2 flex-wrap" id="filterWilayahGroup" style="display:none;">
            <!-- Dropdown wilayah akan di-generate secara dinamis oleh surveijs.html -->
            <div id="dynamicWilayahContainer" class="d-flex flex-row align-items-end gap-2 flex-wrap"></div>
        </div>

        <div class="col-auto" id="filterPencacahGroup" style="display:none;">
            <div class="dropdown">
                <button class="btn btn-outline-secondary bg-white btn-sm dropdown-toggle text-start text-truncate" type="button" id="pencacahBtn" data-bs-toggle="dropdown" data-bs-auto-close="outside" style="min-width:200px; max-width: 250px;">
                    — Semua Pencacah —
                </button>
                <ul class="dropdown-menu shadow" id="pencacahMenu" style="max-height: 300px; overflow-y: auto;">
                    <li><label class="dropdown-item text-muted"><em>— Semua Pencacah —</em></label></li>
                </ul>
            </div>
        </div>
    </div>
    <div class="d-flex align-items-center gap-2 flex-wrap">
        <span class="badge bg-info" id="sampelBadge" style="display:none;"></span>

        <div class="input-group input-group-sm" style="width: 220px;">
            <input type="text" id="tableSearch" class="form-control form-control-sm" placeholder="Cari data..." onkeyup="handleTableSearch()" onkeydown="if(event.key === 'Enter') { fetchSearch(); event.preventDefault(); }">
            <button id="btnFetchSearch" class="btn btn-outline-primary" type="button" onclick="fetchSearch()" title="Cari langsung ke server BPS">🔍</button>
        </div>
        
        <div class="vr d-none d-sm-block align-self-center mx-1" style="height: 20px; opacity: 0.25;"></div>

        <input type="file" id="previewImportInput" accept=".json,application/json" style="display:none;" onchange="handlePreviewImport(event)">
        <button id="btnUploadPreview" class="btn btn-outline-primary btn-sm" onclick="triggerPreviewImport()">Upload Preview JSON</button>
        
        <div class="form-check form-switch mb-0 d-inline-flex align-items-center me-1" style="gap: 5px; height: 31px;">
            <input class="form-check-input mb-0" type="checkbox" id="chkAppendFilter" style="cursor: pointer;" checked>
            <label class="form-check-label small text-muted mb-0" for="chkAppendFilter" style="cursor: pointer; user-select: none;">Append Hasil</label>
        </div>
        <div class="form-check form-switch mb-0 d-inline-flex align-items-center me-1" style="gap: 5px; height: 31px;" title="Ceklis: BPS Fuzzy Search (mengambil 100 baris mirip).&#10;Hapus Ceklis: BPS Exact/Limit Search (hanya mengambil 3 baris teratas, mempercepat fetch bulk).">
            <input class="form-check-input mb-0" type="checkbox" id="chkFuzzySearch" style="cursor: pointer;">
            <label class="form-check-label small text-muted mb-0" for="chkFuzzySearch" style="cursor: pointer; user-select: none;">Fuzzy</label>
        </div>

        <div class="vr d-none d-sm-block align-self-center mx-1" style="height: 20px; opacity: 0.25;"></div>

        <button id="btnFetchSampel" class="btn btn-primary btn-sm" onclick="fetchSampel()">Tampilkan</button>
        <button id="btnStopFetch" class="btn btn-outline-danger btn-sm" onclick="stopFetchSampel()" style="display:none;">Stop Fetch</button>
        <button id="btnClearCache" class="btn btn-secondary btn-sm" onclick="clearDataCache()" style="display:none;">Bersihkan Memori</button>
        <div class="dropdown d-inline-block">
            <button id="btnDownloadDetail" class="btn btn-success btn-sm dropdown-toggle" data-bs-toggle="dropdown"
                data-bs-strategy="fixed">Unduh</button>
            <ul class="dropdown-menu">
                <li><a id="itemDownloadDetail" class="dropdown-item disabled" style="pointer-events: none; opacity: 0.5;" href="#" onclick="downloadDetail(); return false;">⬇ Raw Data (.db)</a></li>
                <li><a id="itemDownloadPreview" class="dropdown-item disabled" style="pointer-events: none; opacity: 0.5;" href="#" onclick="downloadPreview(); return false;">⬇ Preview JSON</a></li>
                <li><a id="itemDownloadForm" class="dropdown-item" href="#" onclick="downloadFormBundle(); return false;">⬇ Form Engine (.form)</a></li>
            </ul>
        </div>
        <button id="btnAutoApprove" class="btn btn-warning btn-sm" onclick="autoApprove()" style="display:none;">Bulk Approve</button>
        <button id="btnBulkReject" class="btn btn-danger btn-sm" onclick="bulkReject()" style="display:none;">Bulk Reject</button>
        <button id="btnStopApprove" class="btn btn-secondary btn-sm" onclick="stopApprove()"
            style="display:none;">Stop</button>
        
        <span id="fetchProgress" style="display:none !important;"></span>
        <span id="downloadProgress" style="display:none !important;"></span>
        <span id="approveProgress" style="display:none !important;"></span>
    </div>
</div>

<!-- Premium Progress Bar Container -->
<div id="progressContainer" class="p-2 bg-white border-bottom flex-shrink-0" style="display:none;">
    <div class="d-flex justify-content-between align-items-center mb-1">
        <span id="progressText" class="small text-muted font-monospace fw-bold"></span>
        <span id="progressPercent" class="badge bg-primary">0%</span>
    </div>
    <div class="progress" style="height: 6px;">
        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;"></div>
    </div>
</div>

<div id="searchKeysNotFoundAlert" class="alert alert-warning m-2 mb-0 py-2 px-3 small d-flex align-items-center gap-2" style="display: none !important;">
    <span>⚠️</span>
    <div>Key tidak ditemukan: <span id="searchKeysNotFoundList" class="fw-bold text-danger"></span></div>
</div>

<div class="flex-grow-1 overflow-auto" style="min-height:0;">
    <table class="table table-hover table-striped mb-0" style="min-width:1100px;">
        <thead class="table-light sticky-top" id="sampelThead">
            <tr>
                <th style="width: 40px; text-align: center;"><input type="checkbox" id="checkAllRows" class="form-check-input"></th>
                <th>No</th>
                <th class="text-nowrap">ID SLS</th>
                <!-- Dynamic columns will be inserted here -->
            </tr>
        </thead>
        <tbody id="sampelTbody">
            <tr>
                <td colspan="17" class="text-center py-4 text-muted"><i>Belum ada data. Klik Tampilkan.</i></td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Pagination Controls Container -->
<div id="paginationContainer" class="p-2 bg-light border-top d-flex justify-content-between align-items-center flex-shrink-0" style="display:none; gap: 15px;">
    <div class="small text-muted" id="paginationInfo">
        Menampilkan 0-0 dari 0 data
    </div>
    <div class="d-flex gap-1 align-items-center">
        <button id="btnPrevPage" class="btn btn-sm btn-outline-secondary py-1 px-3" onclick="prevPage()">Sebelumnya</button>
        <span id="paginationPageNum" class="mx-2 small fw-bold text-secondary">Halaman 1</span>
        <button id="btnNextPage" class="btn btn-sm btn-outline-secondary py-1 px-3" onclick="nextPage()">Berikutnya</button>
    </div>
</div>
