<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
let lastFetchedIds = [];

function loadSampelStatus(periodId) {
    const sel = document.getElementById('statusSelect');
    if (!sel) return;
    sel.innerHTML = '<option value="">Memuat status...</option>';
    fetch(`/fasihsm-fetcher/api/sampel-status?period_id=${periodId}`)
        .then(r => r.json())
        .then(data => {
            sel.innerHTML = `<option value="SEMUA">Semua (${data.total})</option>`;
            (data.statuses || []).forEach(s => {
                sel.innerHTML += `<option value="${s.keyAggregation}">${s.keyAggregation} (${s.docCount})</option>`;
            });
            // Auto initialize filters based on current mode
            toggleFilters();
        })
        .catch(() => { 
            sel.innerHTML = '<option value="SEMUA">Semua</option>';
            toggleFilters();
        });
}

function refreshSampelStatus() {
    if (!currentPeriodId) {
        alert('Pilih survei terlebih dahulu.');
        return;
    }

    const btn = document.getElementById('btnRefreshStatus');
    btn.disabled = true;
    btn.textContent = '...';

    loadSampelStatus(currentPeriodId);

    setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '↻';
    }, 800);
}

function pilihSurvei(surveyId) {
    if (!surveyId) return;
    window.location.href = `/fasihsm-fetcher/listsurvei/${activeCategory}/${surveyId}`;
}

function changePeriod() {
    const sel = document.getElementById('periodSelect');
    if (sel) {
        let newPeriod = sel.value;
        let url = new URL(window.location.href);
        url.searchParams.set("period_id", newPeriod);
        window.location.href = url.toString();
    }
}

function switchTab(key) {
    document.querySelectorAll('.tab-pane-petugas').forEach(el => el.style.display = 'none');
    document.querySelectorAll('[id^="btn-"]').forEach(el => {
        el.classList.remove('btn-info', 'active');
        el.classList.add('btn-outline-info');
    });
    document.getElementById('tab-' + key).style.display = '';
    const btn = document.getElementById('btn-' + key);
    btn.classList.remove('btn-outline-info');
    btn.classList.add('btn-info', 'active');
}

function toggleFilters() {
    const val = document.getElementById('mainFilter').value;
    const gStatus   = document.getElementById('filterStatusGroup');
    const gWilayah  = document.getElementById('filterWilayahGroup');
    const gPencacah = document.getElementById('filterPencacahGroup');

    // Use d-none class for more reliable visibility control with Bootstrap
    gStatus.classList.toggle('d-none', val !== 'status');
    gWilayah.classList.toggle('d-none', val !== 'wilayah');
    gPencacah.classList.toggle('d-none', val !== 'pencacah');
    
    // Fallback style display for non-flex cases
    if (val === 'status') gStatus.style.display = 'flex'; else gStatus.style.display = 'none';
    if (val === 'wilayah') gWilayah.style.display = 'flex'; else gWilayah.style.display = 'none';
    if (val === 'pencacah') gPencacah.style.display = 'block'; else gPencacah.style.display = 'none';

    if (val === 'wilayah' && document.getElementById('kecamatanSelect').options.length <= 1) {
        loadKecamatan();
    } else if (val === 'pencacah' && document.getElementById('pencacahSelect').options.length <= 1) {
        loadPencacah();
    }
}

function loadKecamatan() {
    if (!currentGroupId || !currentLevel2Id) return;
    fetch(`/fasihsm-fetcher/api/proxy/region/level3?groupId=${currentGroupId}&level2Id=${currentLevel2Id}`)
        .then(r => r.json())
        .then(res => {
            const sel = document.getElementById('kecamatanSelect');
            sel.innerHTML = '<option value="">— Semua Kecamatan —</option>';
            (res.data || []).forEach(k => {
                sel.innerHTML += `<option value="${k.id}">[${k.code}] ${k.name}</option>`;
            });
        });
}

function loadDesa() {
    const kecId = document.getElementById('kecamatanSelect').value;
    const desaSel = document.getElementById('desaSelect');
    if (!kecId) {
        desaSel.classList.add('d-none');
        desaSel.style.display = 'none';
        desaSel.innerHTML = '<option value="">— Semua Desa —</option>';
        return;
    }
    desaSel.classList.remove('d-none');
    desaSel.style.display = 'block';
    fetch(`/fasihsm-fetcher/api/proxy/region/level4?groupId=${currentGroupId}&level3Id=${kecId}`)
        .then(r => r.json())
        .then(res => {
            desaSel.innerHTML = '<option value="">— Semua Desa —</option>';
            (res.data || []).forEach(d => {
                desaSel.innerHTML += `<option value="${d.id}">[${d.code}] ${d.name}</option>`;
            });
        });
}

function loadPencacah() {
    if (!currentPeriodId) return;
    const sel = document.getElementById('pencacahSelect');
    sel.innerHTML = '<option value="">Memuat pencacah...</option>';
    
    let url = `/fasihsm-fetcher/api/proxy/users?surveyPeriodId=${currentPeriodId}&surveyId=${currentSurveyId}`;
    if (currentLevel2Code) url += `&regionCode=${currentLevel2Code}`;

    fetch(url)
        .then(r => r.json())
        .then(res => {
            sel.innerHTML = '<option value="">— Semua Pencacah —</option>';
            const seen = new Set();
            (res.data || []).forEach(u => {
                if (seen.has(u.userId)) return;
                seen.add(u.userId);
                sel.innerHTML += `<option value="${u.userId}">${u.username} (${u.email})</option>`;
            });
        })
        .catch(() => { sel.innerHTML = '<option value="">Gagal memuat</option>'; });
}

function fetchSampel() {
    if (!currentPeriodId) { alert('Pilih survei terlebih dahulu.'); return; }
    
    const mode = document.getElementById('mainFilter').value;
    const filters = {};
    
    if (mode === 'status') {
        filters.status_alias = document.getElementById('statusSelect').value;
    } else if (mode === 'wilayah') {
        filters.region3Id = document.getElementById('kecamatanSelect').value || null;
        filters.region4Id = document.getElementById('desaSelect').value || null;
    } else if (mode === 'pencacah') {
        filters.user_id = document.getElementById('pencacahSelect').value || null;
    }

    const btn      = document.getElementById('btnFetchSampel');
    const tbody    = document.getElementById('sampelTbody');
    const badge    = document.getElementById('sampelBadge');
    const progress = document.getElementById('fetchProgress');

    btn.disabled = true;
    btn.textContent = 'Mengambil...';
    if (progress) {
        progress.textContent = 'Menyiapkan...';
        progress.style.display = '';
    }

    fetch('/fasihsm-fetcher/api/sampel-fetch', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            period_id: currentPeriodId, 
            filters: filters
        })
    })
    .then(res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        
        function read() {
            return reader.read().then(({done, value}) => {
                if (done) return;
                buffer += decoder.decode(value, {stream: true});
                const parts = buffer.split('\n\n');
                buffer = parts.pop();
                for (const part of parts) {
                    const line = part.replace(/^data: /, '').trim();
                    if (!line) continue;
                    try {
                        const msg = JSON.parse(line);
                        if (msg.progress !== undefined && progress) {
                            progress.textContent = msg.progress + '/' + msg.total;
                        }
                        if (msg.done) {
                            if (msg.error) {
                                throw new Error(msg.error);
                            }
                            renderSampelRows(msg.rows || []);
                        }
                    } catch(e) {
                        if (e.message !== "Unexpected end of JSON input" && e.name !== "SyntaxError") {
                            console.error(e);
                        }
                    }
                }
                return read();
            });
        }
        return read();
    })
    .catch(err => { alert('Gagal mengambil data: ' + err); })
    .finally(() => {
        btn.disabled = false;
        btn.textContent = 'Tampilkan';
        if (progress) progress.style.display = 'none';
    });

    function renderSampelRows(rows) {
        lastFetchedIds = rows.map(r => r.sample_id).filter(Boolean);
        document.getElementById('btnDownloadDetail').disabled = lastFetchedIds.length === 0;
        badge.textContent = rows.length + ' Data';
        badge.style.display = rows.length ? '' : 'none';
        tbody.innerHTML = rows.length === 0
            ? '<tr><td colspan="16" class="text-center py-4 text-muted"><i>Tidak ada data.</i></td></tr>'
            : rows.map(r => `
                <tr>
                    <td>${r.no}</td>
                    <td class="font-monospace small text-nowrap">${r.id_sls}</td>
                    <td class="text-nowrap">${r.kk}</td>
                    <td class="text-nowrap">${r.anggota}</td>
                    <td class="small">${r.alamat}</td>
                    <td class="small text-nowrap">${r.status_dok}</td>
                    <td class="small text-nowrap">${r.kec}</td>
                    <td class="small text-nowrap">${r.des}</td>
                    <td class="small">${r.sls}</td>
                    <td class="small">${r.sub_sls}</td>
                    <td class="small text-nowrap">${r.pencacah}</td>
                    <td class="small text-nowrap text-muted">${r.created}</td>
                    <td class="small text-nowrap text-muted">${r.modified}</td>
                    <td class="font-monospace small text-nowrap">${r.sample_id}</td>
                    <td class="small">${r.lat}</td>
                    <td class="small">${r.lon}</td>
                </tr>`).join('');
    }
}

function downloadDetail() {
    if (!lastFetchedIds.length) { alert('Tampilkan ringkasan sampel dulu.'); return; }
    const btn      = document.getElementById('btnDownloadDetail');
    const progress = document.getElementById('downloadProgress');
    const total    = lastFetchedIds.length;
    btn.disabled = true;
    progress.textContent = '0/' + total;
    progress.style.display = '';
    fetch('/fasihsm-fetcher/api/sampel-detail-csv', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({sample_ids: lastFetchedIds, survey_name: surveyName})
    })
    .then(res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        function read() {
            return reader.read().then(({done, value}) => {
                if (done) return;
                buffer += decoder.decode(value, {stream: true});
                const parts = buffer.split('\n\n');
                buffer = parts.pop();
                for (const part of parts) {
                    const line = part.replace(/^data: /, '').trim();
                    if (!line) continue;
                    try {
                        const msg = JSON.parse(line);
                        if (msg.progress !== undefined) {
                            progress.textContent = msg.progress + '/' + total;
                        }
                        if (msg.done) {
                            if (msg.error) {
                                alert('Error: ' + msg.error);
                                btn.disabled = false;
                            } else {
                                progress.textContent = total + '/' + total + ' ✓';
                                window.location.href = `/fasihsm-fetcher/api/sampel-detail-download/${msg.token}`;
                                setTimeout(() => { btn.disabled = false; }, 2000);
                            }
                        }
                    } catch(e) {}
                }
                return read();
            });
        }
        return read();
    })
    .catch(err => {
        alert('Gagal download: ' + err);
        btn.disabled = false;
        progress.style.display = 'none';
    });
}

async function autoApprove() {
    if (!currentPeriodId) {
        await Swal.fire({
            icon: 'warning',
            title: 'Pilih survei dulu',
            text: 'Pilih survei terlebih dahulu.'
        });
        return;
    }

    const inputResult = await Swal.fire({
        title: 'Auto Approve',
        text: 'Mau approve berapa sampel?',
        input: 'number',
        inputValue: 100,
        inputAttributes: {
            min: 1,
            step: 1
        },
        showCancelButton: true,
        confirmButtonText: 'Lanjut',
        cancelButtonText: 'Batal',
        reverseButtons: true,
        inputValidator: (value) => {
            const n = parseInt(value, 10);
            if (!Number.isInteger(n) || n <= 0) {
                return 'Jumlah sampel harus berupa angka bulat lebih dari 0.';
            }
        }
    });

    if (!inputResult.isConfirmed) return;

    const nTarget = parseInt(inputResult.value, 10);

    const confirmResult = await Swal.fire({
        title: 'Konfirmasi Approve',
        text: `Approve ${nTarget} assignment dengan status SUBMITTED BY Pencacah?`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Ya, approve',
        cancelButtonText: 'Batal',
        reverseButtons: true
    });

    if (!confirmResult.isConfirmed) return;

    const stopBtn = document.getElementById('btnStopApprove');
    const btn = document.getElementById('btnAutoApprove');
    const progress = document.getElementById('approveProgress');
    const refreshBtn = document.getElementById('btnRefreshStatus');

    stopBtn.style.display = 'inline-block';
    btn.disabled = true;
    if (refreshBtn) refreshBtn.disabled = true;
    progress.style.display = '';
    progress.textContent = 'Menyiapkan...';

    fetch('/fasihsm-fetcher/api/auto-approve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            period_id: currentPeriodId,
            n_target: nTarget
        })
    })
    .then(res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        async function read() {
            return reader.read().then(async ({ done, value }) => {
                if (done) return;

                buffer += decoder.decode(value, { stream: true });
                const parts = buffer.split('\n\n');
                buffer = parts.pop();

                for (const part of parts) {
                    const line = part.replace(/^data: /, '').trim();
                    if (!line) continue;

                    try {
                        const msg = JSON.parse(line);

                        if (msg.progress !== undefined) {
                            progress.textContent = `${msg.progress}/${msg.total} | gagal ${msg.failed}`;
                        }

                        if (msg.done) {
                            document.getElementById('btnStopApprove').style.display = 'none';

                            if (msg.stopped) {
                                progress.textContent = `Dihentikan. Sukses ${msg.success}/${msg.total}, gagal ${msg.failed_count}`;
                                await Swal.fire({
                                    icon: 'info',
                                    title: 'Proses dihentikan',
                                    text: `Sukses: ${msg.success}\nGagal: ${msg.failed_count}`
                                });
                                loadSampelStatus(currentPeriodId);
                                fetchSampel();
                            } else if (msg.error) {
                                await Swal.fire({
                                    icon: 'error',
                                    title: 'Error',
                                    text: msg.error
                                });
                            } else {
                                let text = `Sukses: ${msg.success}\nGagal: ${msg.failed_count}`;
                                if (msg.first_error) {
                                    text += `\n\nContoh gagal:\n${msg.first_error.assignment_id}\n${msg.first_error.message}`;
                                }
                                progress.textContent = `Selesai ✓ ${msg.success}/${msg.total}, gagal ${msg.failed_count}`;
                                await Swal.fire({
                                    icon: 'success',
                                    title: 'Approve selesai',
                                    text
                                });
                                loadSampelStatus(currentPeriodId);
                                fetchSampel();
                            }

                            btn.disabled = false;
                            if (refreshBtn) refreshBtn.disabled = false;
                        }
                    } catch (e) {}
                }

                return read();
            });
        }

        return read();
    })
    .catch(err => {
        Swal.fire({
            icon: 'error',
            title: 'Gagal approve',
            text: String(err)
        });
        btn.disabled = false;
        if (refreshBtn) refreshBtn.disabled = false;
        progress.style.display = 'none';
        document.getElementById('btnStopApprove').style.display = 'none';
    });
}

function stopApprove() {
    if (!currentPeriodId) return;
    
    // Disable stop button saat ditekan
    const stopBtn = document.getElementById('btnStopApprove');
    stopBtn.disabled = true;
    stopBtn.textContent = 'Menghentikan...';
    
    // Panggil route stop untuk set flag di backend (silent, no popup)
    fetch('/fasihsm-fetcher/api/approve-stop', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({period_id: currentPeriodId})
    })
    .catch(err => {
        console.error('Stop request error:', err);
        stopBtn.disabled = false;
        stopBtn.textContent = 'Stop';
    });
}


if (typeof currentPeriodId !== 'undefined' && currentPeriodId) {
    loadSampelStatus(currentPeriodId);
} else {
    toggleFilters();
}
</script>
