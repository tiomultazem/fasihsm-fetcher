<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
let lastFetchedIds = [];
let lastFetchedRows = [];

function loadSampelStatus(periodId) {
    const menu = document.getElementById('statusMenu');
    if (!menu) return;
    menu.innerHTML = '<li><label class="dropdown-item text-muted">Memuat status...</label></li>';
    fetch(`/fasihsm-fetcher/api/sampel-status?period_id=${periodId}`)
        .then(r => r.json())
        .then(data => {
            menu.innerHTML = `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Semua (${data.total})</label></li>`;
            (data.statuses || []).forEach(s => {
                menu.innerHTML += `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="${s.keyAggregation}"> ${s.keyAggregation} (${s.docCount})</label></li>`;
            });
            updateDropdownText('statusMenu', 'statusBtn', '— Semua Status —');
            // Auto initialize filters based on current mode
            toggleFilters();
        })
        .catch(() => { 
            menu.innerHTML = '<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Semua</label></li>';
            updateDropdownText('statusMenu', 'statusBtn', '— Semua Status —');
            toggleFilters();
        });
}

function refreshSampelStatus() {
    if (!currentPeriodId) {
        alert('Pilih survei terlebih dahulu.');
        return;
    }

    const btn = document.getElementById('btnRefreshStatus');
    btn.disabled = true;
    btn.textContent = '...';

    loadSampelStatus(currentPeriodId);

    setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '↻';
    }, 800);
}

function pilihSurvei(surveyId) {
    if (!surveyId) return;
    if (typeof showGlobalLoader === 'function') showGlobalLoader('Memuat Survei...');
    window.location.href = `/fasihsm-fetcher/listsurvei/${activeCategory}/${surveyId}`;
}

function changePeriod() {
    const sel = document.getElementById('periodSelect');
    if (sel) {
        if (typeof showGlobalLoader === 'function') showGlobalLoader('Mengubah Periode...');
        let newPeriod = sel.value;
        let url = new URL(window.location.href);
        url.searchParams.set("period_id", newPeriod);
        window.location.href = url.toString();
    }
}

function switchTab(key) {
    document.querySelectorAll('.tab-pane-petugas').forEach(el => el.classList.add('d-none'));
    document.querySelectorAll('[id^="btn-"]').forEach(el => {
        el.classList.remove('btn-info', 'active');
        el.classList.add('btn-outline-info');
    });
    document.getElementById('tab-' + key).classList.remove('d-none');
    const btn = document.getElementById('btn-' + key);
    btn.classList.remove('btn-outline-info');
    btn.classList.add('btn-info', 'active');
}

function toggleFilters() {
    const val = document.getElementById('mainFilter').value;
    const gStatus   = document.getElementById('filterStatusGroup');
    const gWilayah  = document.getElementById('filterWilayahGroup');
    const gPencacah = document.getElementById('filterPencacahGroup');

    gStatus.classList.toggle('d-none', val !== 'status');
    gWilayah.classList.toggle('d-none', val !== 'wilayah');
    gPencacah.classList.toggle('d-none', val !== 'pencacah');
    
    if (val === 'status') gStatus.style.display = 'flex'; else gStatus.style.display = 'none';
    if (val === 'wilayah') gWilayah.style.display = 'flex'; else gWilayah.style.display = 'none';
    if (val === 'pencacah') gPencacah.style.display = 'block'; else gPencacah.style.display = 'none';

    if (val === 'pencacah' && document.getElementById('pencacahMenu').querySelectorAll('input').length <= 1) {
        loadPencacah();
    }
}

let regionMetadata = null;

function initRegionFilters() {
    if (!currentGroupId) return;
    fetch(`/fasihsm-fetcher/api/proxy/region/metadata?groupId=${currentGroupId}`)
        .then(r => r.json())
        .then(res => {
            if (res.data && res.data.level) {
                regionMetadata = res.data;
                buildWilayahDropdowns();
            }
        });
}

function buildWilayahDropdowns() {
    const container = document.getElementById('dynamicWilayahContainer');
    if (!container || !regionMetadata) return;
    
    container.innerHTML = '';
    const levels = regionMetadata.level;
    const startLevel = 3;
    
    for (let i = startLevel; i <= regionMetadata.levelCount; i++) {
        const levelData = levels.find(l => l.id === i);
        if (!levelData) continue;
        
        const isFirst = i === startLevel;
        const displayStyle = isFirst ? 'block' : 'none';
        const defaultText = `— Semua ${levelData.name} —`;
        
        const html = `
            <div class="dropdown" id="regionDropdownContainer_${i}" style="display:${displayStyle};">
                <button class="btn btn-outline-secondary bg-white btn-sm dropdown-toggle text-start text-truncate" type="button" id="regionBtn_${i}" data-bs-toggle="dropdown" data-bs-auto-close="outside" style="min-width:150px; max-width: 200px;">
                    ${defaultText}
                </button>
                <ul class="dropdown-menu shadow" id="regionMenu_${i}" style="max-height: 300px; overflow-y: auto;">
                    <li><label class="dropdown-item text-muted"><em>${defaultText}</em></label></li>
                </ul>
            </div>
        `;
        container.innerHTML += html;
    }
    
    for (let i = startLevel; i <= regionMetadata.levelCount; i++) {
        const levelData = levels.find(l => l.id === i);
        if (!levelData) continue;
        
        const onChangeCallback = () => {
            if (i < regionMetadata.levelCount) {
                loadDynamicRegionLevel(i + 1);
            }
        };
        attachCheckboxLogic(`regionMenu_${i}`, `regionBtn_${i}`, `— Semua ${levelData.name} —`, onChangeCallback);
    }
    
    loadDynamicRegionLevel(startLevel);
}

function loadDynamicRegionLevel(targetLevel) {
    if (!regionMetadata) return;
    const levelData = regionMetadata.level.find(l => l.id === targetLevel);
    if (!levelData) return;
    
    const menuId = `regionMenu_${targetLevel}`;
    const btnId = `regionBtn_${targetLevel}`;
    const contId = `regionDropdownContainer_${targetLevel}`;
    const defaultText = `— Semua ${levelData.name} —`;
    
    const menu = document.getElementById(menuId);
    const cont = document.getElementById(contId);
    if (!menu || !cont) return;
    
    let parentIds = [];
    if (targetLevel === 3) {
        parentIds = [currentLevel2Id]; 
    } else {
        const parentMenuId = `regionMenu_${targetLevel - 1}`;
        parentIds = getSelectedValues(parentMenuId).filter(v => v !== 'SEMUA');
    }
    
    for (let i = targetLevel; i <= regionMetadata.levelCount; i++) {
        const m = document.getElementById(`regionMenu_${i}`);
        const c = document.getElementById(`regionDropdownContainer_${i}`);
        const b = document.getElementById(`regionBtn_${i}`);
        const lvData = regionMetadata.level.find(l => l.id === i);
        if (c && m && b && lvData) {
            c.style.display = i === targetLevel && parentIds.length > 0 ? 'block' : 'none';
            m.innerHTML = `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Semua ${lvData.name}</label></li>`;
            updateDropdownText(`regionMenu_${i}`, `regionBtn_${i}`, `— Semua ${lvData.name} —`);
        }
    }
    
    if (parentIds.length === 0) return;
    
    menu.innerHTML = '<li><label class="dropdown-item text-muted">Memuat...</label></li>';
    const parentParam = targetLevel === 3 ? 'level2Id' : `level${targetLevel - 1}Id`;
    
    Promise.all(parentIds.map(pid => 
        fetch(`/fasihsm-fetcher/api/proxy/region/level/${targetLevel}?groupId=${currentGroupId}&${parentParam}=${pid}`).then(r => r.json())
    )).then(responses => {
        menu.innerHTML = `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Semua ${levelData.name}</label></li>`;
        let countItems = [];
        responses.forEach(res => {
            (res.data || []).forEach(d => {
                menu.innerHTML += `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="${d.id}"> [${d.code}] ${d.name}</label></li>`;
                countItems.push({ id: d.id, type: `region${targetLevel}Id` });
            });
        });
        updateDropdownText(menuId, btnId, defaultText);
        updateLiveCounts(countItems, menuId, btnId, defaultText);
    }).catch(() => {
        menu.innerHTML = `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Gagal memuat</label></li>`;
        updateDropdownText(menuId, btnId, defaultText);
    });
}

function loadPencacah() {
    if (!currentPeriodId) return;
    const menu = document.getElementById('pencacahMenu');
    
    // Prioritaskan data yang sudah ada di tab Petugas agar tidak fetch seluruh Indonesia
    if (typeof petugasData !== 'undefined' && petugasData && petugasData.data) {
        menu.innerHTML = '<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Semua Pencacah</label></li>';
        const seen = new Set();
        let countItems = [];
        const pencacahRoles = (petugasData.roles || []).filter(r => r.isPencacah);
        pencacahRoles.forEach(role => {
            (petugasData.data[role.key] || []).forEach(u => {
                if (!u.userId || seen.has(u.userId)) return;
                seen.add(u.userId);
                menu.innerHTML += `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="${u.userId}"> ${u.nama} (${u.email})</label></li>`;
                countItems.push({ id: u.userId, type: 'user_id' });
            });
        });
        updateDropdownText('pencacahMenu', 'pencacahBtn', '— Semua Pencacah —');
        if (countItems.length > 0) updateLiveCounts(countItems, 'pencacahMenu', 'pencacahBtn', '— Semua Pencacah —');
        if (seen.size > 0) return; 
    }

    menu.innerHTML = '<li><label class="dropdown-item text-muted">Memuat pencacah...</label></li>';
    let url = `/fasihsm-fetcher/api/proxy/users?surveyPeriodId=${currentPeriodId}&surveyId=${currentSurveyId}`;
    if (currentLevel2Code) url += `&regionCode=${currentLevel2Code}`;

    fetch(url)
        .then(r => r.json())
        .then(res => {
            menu.innerHTML = '<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Semua Pencacah</label></li>';
            const seen = new Set();
            let countItems = [];
            (res.data || []).forEach(u => {
                if (seen.has(u.userId)) return;
                seen.add(u.userId);
                menu.innerHTML += `<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="${u.userId}"> ${u.username} (${u.email})</label></li>`;
                countItems.push({ id: u.userId, type: 'user_id' });
            });
            updateDropdownText('pencacahMenu', 'pencacahBtn', '— Semua Pencacah —');
            updateLiveCounts(countItems, 'pencacahMenu', 'pencacahBtn', '— Semua Pencacah —');
        })
        .catch(() => { 
            menu.innerHTML = '<li><label class="dropdown-item"><input type="checkbox" class="form-check-input me-2" value="SEMUA" checked> Gagal memuat</label></li>'; 
            updateDropdownText('pencacahMenu', 'pencacahBtn', '— Semua Pencacah —');
        });
}

function fetchSampel() {
    if (!currentPeriodId) { alert('Pilih survei terlebih dahulu.'); return; }
    
    const mode = document.getElementById('mainFilter').value;
    const filters = {};
    
    if (mode === 'status') {
        filters.status_alias = getSelectedValues('statusMenu');
    } else if (mode === 'wilayah') {
        if (regionMetadata && regionMetadata.levelCount >= 3) {
            for (let i = 3; i <= regionMetadata.levelCount; i++) {
                const vals = getSelectedValues(`regionMenu_${i}`).filter(v => v !== 'SEMUA');
                if (vals.length > 0) {
                    filters[`region${i}Id`] = vals;
                }
            }
        }
    } else if (mode === 'pencacah') {
        filters.user_id = getSelectedValues('pencacahMenu').filter(v => v !== 'SEMUA');
    }

    const btn      = document.getElementById('btnFetchSampel');
    const tbody    = document.getElementById('sampelTbody');
    const badge    = document.getElementById('sampelBadge');
    const progress = document.getElementById('fetchProgress');

    btn.disabled = true;
    btn.textContent = 'Mengambil...';
    if (progress) {
        progress.textContent = 'Menyiapkan...';
        progress.style.display = '';
    }

    fetch('/fasihsm-fetcher/api/sampel-fetch', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            period_id: currentPeriodId, 
            survey_id: currentSurveyId,
            filters: filters
        })
    })
    .then(res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        
        function read() {
            return reader.read().then(({done, value}) => {
                if (done) return;
                buffer += decoder.decode(value, {stream: true});
                const parts = buffer.split('\n\n');
                buffer = parts.pop();
                for (const part of parts) {
                    const line = part.replace(/^data: /, '').trim();
                    if (!line) continue;
                    try {
                        const msg = JSON.parse(line);
                        if (msg.progress !== undefined && progress) {
                            progress.textContent = msg.progress + '/' + msg.total;
                        }
                        if (msg.done) {
                            if (msg.error) {
                                throw new Error(msg.error);
                            }
                            renderSampelRows(msg.rows || []);
                        }
                    } catch(e) {
                        if (e.message !== "Unexpected end of JSON input" && e.name !== "SyntaxError") {
                            console.error(e);
                        }
                    }
                }
                return read();
            });
        }
        return read();
    })
    .catch(err => { alert('Gagal mengambil data: ' + err); })
    .finally(() => {
        btn.disabled = false;
        btn.textContent = 'Tampilkan';
        if (progress) progress.style.display = 'none';
    });

    function renderSampelRows(rows) {
        lastFetchedRows = rows;
        lastFetchedIds = rows.map(r => r.sample_id).filter(Boolean);
        const hasData = lastFetchedIds.length > 0;
        document.getElementById('btnDownloadDetail').disabled = !hasData;
        badge.textContent = rows.length + ' Data';
        badge.style.display = rows.length ? '' : 'none';
        
        if (rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="30" class="text-center py-4 text-muted"><i>Tidak ada data.</i></td></tr>';
            return;
        }

        tbody.innerHTML = rows.map(r => {
            let rHtml = `
            <tr>
                <td class="text-center"><input type="checkbox" class="form-check-input row-cb" value="${r.sample_id}"></td>
                <td>${r.no}</td>
                <td class="font-monospace small text-nowrap">${r.id_sls}</td>`;
                
            if (typeof customColumns !== 'undefined' && customColumns.length > 0) {
                customColumns.forEach(c => {
                    rHtml += `<td class="text-nowrap">${r[c.key] || '-'}</td>`;
                });
            }
            
            rHtml += `<td class="small text-nowrap">${r.status_dok}</td>`;
            
            if (typeof regionLevels !== 'undefined' && regionLevels.length > 0) {
                regionLevels.forEach((_, idx) => {
                    const val = r.regions && r.regions[idx] ? r.regions[idx] : '-';
                    rHtml += `<td class="small text-nowrap">${val}</td>`;
                });
            }
            
            rHtml += `
                <td class="small text-nowrap">${r.pencacah}</td>
                <td class="small text-nowrap text-muted">${r.created}</td>
                <td class="small text-nowrap text-muted">${r.modified}</td>
                <td class="font-monospace small text-nowrap">${r.sample_id}</td>
                <td class="small">${r.lat}</td>
                <td class="small">${r.lon}</td>
            </tr>`;
            return rHtml;
        }).join('');
    }
}

function downloadDetail() {
    if (!lastFetchedIds.length) { alert('Tampilkan ringkasan sampel dulu.'); return; }
    const btn      = document.getElementById('btnDownloadDetail');
    const progress = document.getElementById('downloadProgress');
    const total    = lastFetchedIds.length;
    btn.disabled = true;
    progress.textContent = '0/' + total;
    progress.style.display = '';
    fetch('/fasihsm-fetcher/api/sampel-detail-csv', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({sample_ids: lastFetchedIds, survey_name: surveyName})
    })
    .then(res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        function read() {
            return reader.read().then(({done, value}) => {
                if (done) return;
                buffer += decoder.decode(value, {stream: true});
                const parts = buffer.split('\n\n');
                buffer = parts.pop();
                for (const part of parts) {
                    const line = part.replace(/^data: /, '').trim();
                    if (!line) continue;
                    try {
                        const msg = JSON.parse(line);
                        if (msg.progress !== undefined) {
                            progress.textContent = msg.progress + '/' + total;
                        }
                        if (msg.done) {
                            if (msg.error) {
                                alert('Error: ' + msg.error);
                                btn.disabled = false;
                            } else {
                                progress.textContent = total + '/' + total + ' ✓';
                                window.location.href = `/fasihsm-fetcher/api/sampel-detail-download/${msg.token}`;
                                setTimeout(() => { btn.disabled = false; }, 2000);
                            }
                        }
                    } catch(e) {}
                }
                return read();
            });
        }
        return read();
    })
    .catch(err => {
        alert('Gagal download: ' + err);
        btn.disabled = false;
        progress.style.display = 'none';
    });
}

function downloadPreview() {
    if (!lastFetchedRows.length) { alert('Tampilkan data terlebih dahulu.'); return; }
    
    let headers = ['No', 'ID SLS'];
    let keys = ['no', 'id_sls'];
    
    if (typeof customColumns !== 'undefined' && customColumns.length > 0) {
        customColumns.forEach(c => {
            headers.push(c.label);
            keys.push(c.key);
        });
    }
    
    headers.push('Status Dok');
    keys.push('status_dok');
    
    if (typeof regionLevels !== 'undefined' && regionLevels.length > 0) {
        regionLevels.forEach((r, idx) => {
            headers.push(r);
            keys.push(`region_${idx}`);
        });
    }
    
    headers.push('Pencacah', 'Dibuat', 'Dimodifikasi', 'Sample ID', 'Lat', 'Lon');
    keys.push('pencacah', 'created', 'modified', 'sample_id', 'lat', 'lon');
    
    const csv = [headers.join(','), ...lastFetchedRows.map(r => keys.map(k => {
        let val;
        if (k.startsWith('region_')) {
            const idx = parseInt(k.replace('region_', ''));
            val = r.regions && r.regions[idx] ? r.regions[idx] : '-';
        } else {
            val = r[k] ?? '';
        }
        return `"${String(val).replace(/"/g,'""')}"`;
    }).join(','))].join('\n');
    
    _triggerCsvDownload(csv, `${surveyName}_preview.csv`);
}

function downloadPetugasPreview() {
    if (!petugasData) { alert('Data petugas belum dimuat.'); return; }
    const activeTab = document.querySelector('.tab-pane-petugas:not(.d-none)');
    if (!activeTab) return;
    const roleKey = activeTab.id.replace('tab-', '');
    const role    = (petugasData.roles || []).find(r => r.key === roleKey);
    const rows    = (petugasData.data || {})[roleKey] || [];
    const label   = role ? role.label : roleKey;
    const headers = ['No','Nama','Email','Wilayah'];
    const keys    = ['no','nama','email','wilayah'];
    const csv = [headers.join(','), ...rows.map(r => keys.map(k => `"${String(r[k]??'').replace(/"/g,'""')}"`).join(','))].join('\n');
    _triggerCsvDownload(csv, `petugas_${label}.csv`);
}

function downloadPetugasAll() {
    if (!petugasData) { alert('Data petugas belum dimuat.'); return; }
    const headers = ['Role','No','Nama','Email','Wilayah'];
    const rows = [];
    (petugasData.roles || []).forEach(role => {
        (petugasData.data[role.key] || []).forEach(p => {
            rows.push([role.label, p.no, p.nama, p.email, p.wilayah]);
        });
    });
    const csv = [headers.join(','), ...rows.map(r => r.map(v => `"${String(v??'').replace(/"/g,'""')}"`).join(','))].join('\n');
    _triggerCsvDownload(csv, `petugas_semua_role.csv`);
}

function downloadMetadata() {
    if (!surveyName) { alert('Pilih survei terlebih dahulu.'); return; }
    const rows = [];
    document.querySelectorAll('#tab-metadata table tbody tr').forEach(tr => {
        const th = tr.querySelector('th');
        const td = tr.querySelector('td');
        if (th && td) rows.push([th.innerText.trim(), td.innerText.trim()]);
    });
    const csv = ['Field,Nilai', ...rows.map(r => r.map(v => `"${v.replace(/"/g,'""')}"`).join(','))].join('\n');
    _triggerCsvDownload(csv, `metadata_${surveyName}.csv`);
}

function _triggerCsvDownload(csvContent, filename) {
    const BOM = '\uFEFF';
    const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
}

async function processBulkAction(actionType) {
    if (!currentPeriodId) {
        await Swal.fire({ icon: 'warning', title: 'Pilih survei dulu', text: 'Pilih survei terlebih dahulu.' });
        return;
    }

    const checkedCbs = document.querySelectorAll('.row-cb:checked');
    if (checkedCbs.length === 0) return;

    const assignmentIds = Array.from(checkedCbs).map(cb => cb.value);
    const nTarget = assignmentIds.length;
    const isApprove = actionType === 'approve';
    const actionLabel = isApprove ? 'Approve' : 'Reject';
    const endpoint = isApprove ? '/fasihsm-fetcher/api/auto-approve' : '/fasihsm-fetcher/api/bulk-reject';

    const confirmResult = await Swal.fire({
        title: `Konfirmasi ${actionLabel}`,
        text: `Anda yakin akan me-${actionLabel.toLowerCase()} ${nTarget} data yang dipilih?`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: `Ya, ${actionLabel}`,
        cancelButtonText: 'Batal',
        reverseButtons: true
    });

    if (!confirmResult.isConfirmed) return;

    const stopBtn = document.getElementById('btnStopApprove');
    const btnApprove = document.getElementById('btnAutoApprove');
    const btnReject = document.getElementById('btnBulkReject');
    const progress = document.getElementById('approveProgress');
    const refreshBtn = document.getElementById('btnRefreshStatus');

    stopBtn.style.display = 'inline-block';
    btnApprove.disabled = true;
    btnReject.disabled = true;
    if (refreshBtn) refreshBtn.disabled = true;
    progress.style.display = '';
    progress.textContent = 'Menyiapkan...';

    fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            period_id: currentPeriodId,
            assignment_ids: assignmentIds
        })
    })
    .then(res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        async function read() {
            return reader.read().then(async ({ done, value }) => {
                if (done) return;

                buffer += decoder.decode(value, { stream: true });
                const parts = buffer.split('\n\n');
                buffer = parts.pop();

                for (const part of parts) {
                    const line = part.replace(/^data: /, '').trim();
                    if (!line) continue;

                    try {
                        const msg = JSON.parse(line);

                        if (msg.progress !== undefined) {
                            progress.textContent = `${msg.progress}/${msg.total} | gagal ${msg.failed}`;
                        }

                        if (msg.done) {
                            document.getElementById('btnStopApprove').style.display = 'none';

                            if (msg.stopped) {
                                progress.textContent = `Dihentikan. Sukses ${msg.success}/${msg.total}, gagal ${msg.failed_count}`;
                                await Swal.fire({
                                    icon: 'info',
                                    title: 'Proses dihentikan',
                                    text: `Sukses: ${msg.success}\nGagal: ${msg.failed_count}`
                                });
                            } else if (msg.error) {
                                await Swal.fire({
                                    icon: 'error',
                                    title: 'Error',
                                    text: msg.error
                                });
                            } else {
                                let text = `Sukses: ${msg.success}\nGagal: ${msg.failed_count}`;
                                if (msg.first_error) {
                                    text += `\n\nContoh gagal:\n${msg.first_error.assignment_id}\n${msg.first_error.message}`;
                                }
                                progress.textContent = `Selesai ✓ ${msg.success}/${msg.total}, gagal ${msg.failed_count}`;
                                await Swal.fire({
                                    icon: 'success',
                                    title: `${actionLabel} selesai`,
                                    text
                                });
                            }

                            btnApprove.disabled = false;
                            btnReject.disabled = false;
                            if (refreshBtn) refreshBtn.disabled = false;
                        }
                    } catch (e) {}
                }

                return read();
            });
        }

        return read();
    })
    .catch(err => {
        Swal.fire({
            icon: 'error',
            title: `Gagal ${actionLabel.toLowerCase()}`,
            text: String(err)
        });
        btnApprove.disabled = false;
        btnReject.disabled = false;
        if (refreshBtn) refreshBtn.disabled = false;
        progress.style.display = 'none';
        document.getElementById('btnStopApprove').style.display = 'none';
    });
}

function autoApprove() { processBulkAction('approve'); }
function bulkReject() { processBulkAction('reject'); }

function stopApprove() {
    if (!currentPeriodId) return;
    
    // Disable stop button saat ditekan
    const stopBtn = document.getElementById('btnStopApprove');
    stopBtn.disabled = true;
    stopBtn.textContent = 'Menghentikan...';
    
    // Panggil route stop untuk set flag di backend (silent, no popup)
    fetch('/fasihsm-fetcher/api/approve-stop', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({period_id: currentPeriodId})
    })
    .catch(err => {
        console.error('Stop request error:', err);
        stopBtn.disabled = false;
        stopBtn.textContent = 'Stop';
    });
}

// Helper Functions for Checkbox Dropdowns
function getSelectedValues(menuId) {
    const menu = document.getElementById(menuId);
    if (!menu) return [];
    const checked = Array.from(menu.querySelectorAll('input[type="checkbox"]:checked'));
    const vals = checked.map(cb => cb.value);
    if (vals.includes('SEMUA') && vals.length === 1) return ['SEMUA'];
    // Remove SEMUA if others are selected
    return vals.filter(v => v !== 'SEMUA');
}

function attachCheckboxLogic(menuId, btnId, defaultText, onChangeCallback = null) {
    const menu = document.getElementById(menuId);
    if (!menu) return;
    
    menu.addEventListener('change', function(e) {
        if (e.target.tagName === 'INPUT' && e.target.type === 'checkbox') {
            const isSemua = e.target.value === 'SEMUA';
            if (isSemua && e.target.checked) {
                menu.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                    if (cb.value !== 'SEMUA') cb.checked = false;
                });
            } else if (!isSemua && e.target.checked) {
                const cbSemua = menu.querySelector('input[value="SEMUA"]');
                if (cbSemua) cbSemua.checked = false;
            }
            
            const checked = menu.querySelectorAll('input[type="checkbox"]:checked');
            if (checked.length === 0) {
                const cbSemua = menu.querySelector('input[value="SEMUA"]');
                if (cbSemua) cbSemua.checked = true;
            }

            updateDropdownText(menuId, btnId, defaultText);
            if (onChangeCallback) onChangeCallback();
        }
    });
}

function updateLiveCounts(items, menuId, btnId, defaultText) {
    if (!items || items.length === 0 || !currentPeriodId) return;
    
    fetch('/fasihsm-fetcher/api/proxy/counts', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ period_id: currentPeriodId, items: items })
    })
    .then(r => r.json())
    .then(counts => {
        const menu = document.getElementById(menuId);
        if (!menu) return;
        
        let allCount = 0;
        menu.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            const val = cb.value;
            if (val !== 'SEMUA' && counts[val] !== undefined) {
                const label = cb.closest('label');
                let text = label.textContent.trim();
                text = text.replace(/\s\(\d+\)$/, '');
                label.innerHTML = `<input type="checkbox" class="form-check-input me-2" value="${val}" ${cb.checked ? 'checked' : ''}> ${text} (${counts[val]})`;
                allCount += counts[val];
            }
        });
        
        const semuaCb = menu.querySelector('input[value="SEMUA"]');
        if (semuaCb) {
            const label = semuaCb.closest('label');
            let text = label.textContent.trim();
            text = text.replace(/\s\(\d+\)$/, '');
            label.innerHTML = `<input type="checkbox" class="form-check-input me-2" value="SEMUA" ${semuaCb.checked ? 'checked' : ''}> ${text} (${allCount})`;
        }
        
        updateDropdownText(menuId, btnId, defaultText);
    })
    .catch(console.error);
}

function updateDropdownText(menuId, btnId, defaultText) {
    const menu = document.getElementById(menuId);
    const btn = document.getElementById(btnId);
    if (!menu || !btn) return;
    
    const checked = Array.from(menu.querySelectorAll('input[type="checkbox"]:checked'));
    if (checked.length === 0 || (checked.length === 1 && checked[0].value === 'SEMUA')) {
        btn.textContent = defaultText;
    } else {
        const labels = checked.map(cb => cb.closest('label').textContent.trim());
        btn.textContent = labels.join(', ');
    }
}

            <th>Lon</th>
        </tr>
    `;
    thead.innerHTML = html;
}

// Table Checkbox Logic
let lastCheckedRowIndex = -1;

document.addEventListener('change', function(e) {
    if (e.target.id === 'checkAllRows') {
        const checked = e.target.checked;
        const cbs = document.querySelectorAll('.row-cb');
        cbs.forEach(cb => cb.checked = checked);
        updateBulkButtons();
    } else if (e.target.classList.contains('row-cb')) {
        updateBulkButtons();
    }
});

document.addEventListener('click', function(e) {
    if (e.target.classList.contains('row-cb')) {
        const cbs = Array.from(document.querySelectorAll('.row-cb'));
        const currentIndex = cbs.indexOf(e.target);
        
        if (e.shiftKey && lastCheckedRowIndex !== -1) {
            const start = Math.min(lastCheckedRowIndex, currentIndex);
            const end = Math.max(lastCheckedRowIndex, currentIndex);
            const isChecked = e.target.checked;
            for (let i = start; i <= end; i++) {
                cbs[i].checked = isChecked;
            }
            updateBulkButtons();
        }
        lastCheckedRowIndex = currentIndex;
    }
});

function updateBulkButtons() {
    const checkedCount = document.querySelectorAll('.row-cb:checked').length;
    const btnApprove = document.getElementById('btnAutoApprove');
    const btnReject = document.getElementById('btnBulkReject');
    
    if (checkedCount > 0) {
        btnApprove.style.display = 'inline-block';
        btnApprove.textContent = `Bulk Approve (${checkedCount})`;
        btnReject.style.display = 'inline-block';
        btnReject.textContent = `Bulk Reject (${checkedCount})`;
    } else {
        btnApprove.style.display = 'none';
        btnReject.style.display = 'none';
        document.getElementById('checkAllRows').checked = false;
    }
}
